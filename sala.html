<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Reunião</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --mp-navy:   #2D3F5E;
  --mp-yellow: #C8C84A;
  --mp-teal:   #4DBCC8;
  --bg:        #F4F6FA;
  --card:      #FFFFFF;
  --border:    #E2E8F0;
  --text:      #1E293B;
  --text2:     #64748B;
  --text3:     #94A3B8;
  --green:     #16A34A; --green-bg: #DCFCE7;
  --red:       #DC2626; --red-bg:   #FEE2E2;
  --amber:     #D97706; --amber-bg: #FEF3C7;
  --blue:      #2563EB; --blue-bg:  #DBEAFE;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }
.container { max-width: 1280px; margin: 0 auto; padding: 22px 28px; }

/* Header */
.sl-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
.sl-title { font-size: 22px; font-weight: 700; color: var(--mp-navy); }
.sl-subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }
.btn-novo { background: var(--mp-navy); color: #fff; border: 0; padding: 10px 18px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.btn-novo:hover { background: #1e2c44; }

/* Status agora */
.status-now { padding: 18px 22px; border-radius: 12px; margin-bottom: 18px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.status-now.livre   { background: var(--green-bg); border: 2px solid var(--green); }
.status-now.ocupada { background: var(--red-bg);   border: 2px solid var(--red); }
.status-now.minha   { background: var(--amber-bg);  border: 2px solid var(--amber); }
.status-icon { font-size: 28px; }
.status-title { font-weight: 800; font-size: 17px; }
.status-sub { font-size: 12.5px; color: var(--text2); margin-top: 2px; }

/* Nav semana */
.week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }
.week-nav button { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-weight: 600; color: var(--text2); }
.week-nav button:hover { background: var(--mp-navy); color: #fff; border-color: var(--mp-navy); }
.week-label { font-size: 13px; font-weight: 700; color: var(--mp-navy); }

/* Mini calendário semana */
.mini-week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 22px; }
.mini-day { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 10px 8px; cursor: pointer; text-align: center; transition: all .12s; }
.mini-day:hover { border-color: var(--mp-teal); }
.mini-day.active { border-color: var(--mp-navy); background: var(--mp-navy); color: #fff; }
.mini-day.today { border-color: var(--mp-yellow); }
.mini-day .dow { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; font-weight: 700; opacity: .7; }
.mini-day .num { font-size: 18px; font-weight: 700; margin-top: 2px; }
.mini-day .cnt { font-size: 10px; margin-top: 4px; opacity: .8; }
.mini-day.active .cnt { color: #fff; }
.mini-day .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--mp-teal); margin: 0 1px; }

/* Agenda do dia */
.agenda { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 22px; }
.agenda-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.agenda-title { font-size: 18px; font-weight: 700; color: var(--mp-navy); }
.agenda-title .day-of-week { color: var(--text2); font-weight: 500; font-size: 14px; margin-left: 6px; }

/* Timeline */
.timeline { position: relative; padding-left: 60px; min-height: 600px; }
.tl-hour { position: relative; height: 60px; border-top: 1px solid var(--border); }
.tl-hour:last-child { border-bottom: 1px solid var(--border); }
.tl-hour-label { position: absolute; left: -56px; top: -8px; font-size: 11px; color: var(--text3); font-weight: 600; width: 50px; text-align: right; }
.tl-now-line {
  position: absolute; left: 0; right: 0; height: 2px; background: var(--red);
  z-index: 5; pointer-events: none;
}
.tl-now-line::before {
  content: ''; position: absolute; left: -7px; top: -5px;
  width: 12px; height: 12px; border-radius: 50%; background: var(--red);
}
.tl-now-line::after {
  content: 'AGORA'; position: absolute; right: 0; top: -16px;
  background: var(--red); color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; letter-spacing: .5px;
}

.tl-event {
  position: absolute; left: 4px; right: 4px;
  border-radius: 8px; padding: 8px 12px;
  cursor: pointer; transition: transform .12s, box-shadow .12s;
  font-size: 12px; line-height: 1.35;
  color: #fff; overflow: hidden;
  z-index: 2;
}
.tl-event:hover { transform: translateX(2px); box-shadow: 0 4px 14px rgba(0,0,0,.15); z-index: 10; }
.tl-event.passed { opacity: .55; }
.tl-event-time { font-weight: 700; font-size: 11px; opacity: .92; }
.tl-event-name { font-weight: 700; margin-top: 1px; font-size: 13px; }
.tl-event-cli { font-size: 11.5px; opacity: .9; margin-top: 1px; }
.tl-empty-msg { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; }

/* Modal */
.modal-bg { position: fixed; inset: 0; background: rgba(15,23,42,.55); display: none; align-items: flex-start; justify-content: center; z-index: 9999; padding: 40px 20px; overflow-y: auto; }
.modal-bg.show { display: flex; }
.modal { background: #fff; border-radius: 14px; padding: 26px 30px; width: 100%; max-width: 540px; margin-bottom: 40px; }
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: var(--mp-navy); }
.modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
.fld { margin-bottom: 12px; }
.fld label { display: block; font-size: 10.5px; text-transform: uppercase; letter-spacing: .5px; font-weight: 700; color: var(--text2); margin-bottom: 5px; }
.fld input, .fld select, .fld textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 13.5px; font-family: inherit; outline: 0; }
.fld input:focus, .fld select:focus, .fld textarea:focus { border-color: var(--mp-teal); }
.fld textarea { min-height: 70px; resize: vertical; }
.fld-row { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
.modal-foot { display: flex; gap: 10px; justify-content: space-between; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); align-items: center; }
.btn-cancel { background: #fff; color: var(--text2); border: 1px solid var(--border); padding: 9px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
.btn-del { background: #fff; color: var(--red); border: 1px solid var(--red); padding: 9px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
.btn-save { background: var(--green); color: #fff; border: 0; padding: 9px 22px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; }
.btn-save:hover { background: #15803d; }
.btn-save:disabled { opacity: .5; cursor: not-allowed; }
.warn-conflict { background: var(--amber-bg); border: 1px solid var(--amber); padding: 10px 14px; border-radius: 8px; font-size: 12.5px; color: var(--amber); margin-bottom: 12px; }
.warn-conflict strong { color: #92400e; }

.spinner { display: inline-block; width: 20px; height: 20px; border: 2.5px solid var(--border); border-top-color: var(--mp-teal); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #fff; padding: 12px 18px; border-radius: 10px; font-weight: 600; font-size: 13px; box-shadow: 0 10px 24px rgba(0,0,0,.14); z-index: 10001; animation: slidein .25s; }
.toast.err { background: var(--red); }
@keyframes slidein { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

@media (max-width: 700px) {
  .container { padding: 14px; }
  .mini-day .cnt { display: none; }
  .timeline { padding-left: 44px; }
  .tl-hour-label { left: -42px; font-size: 10px; }
}
</style>
</head>
<body>

<div class="container" id="main">
  <div class="sl-head"><div><div class="sl-title">Sala de Reunião</div><div class="sl-subtitle">Carregando...</div></div></div>
  <div style="text-align:center;padding:60px"><div class="spinner"></div></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2 id="modal-title">Nova reserva</h2>
    <div class="modal-sub" id="modal-sub">Reservar a sala de reunião</div>
    <div id="modal-conflict" style="display:none"></div>

    <div class="fld" id="fld-consultor" style="display:none">
      <label>Reservar para *</label>
      <select id="sl-consultor"></select>
    </div>

    <div class="fld-row">
      <div class="fld"><label>Início *</label><input type="datetime-local" id="sl-inicio" required></div>
      <div class="fld"><label>Fim *</label><input type="datetime-local" id="sl-fim" required></div>
    </div>

    <div class="fld">
      <label>Cliente (opcional)</label>
      <input type="text" id="sl-cliente" placeholder="Nome do cliente">
    </div>

    <div class="fld">
      <label>Motivo / Pauta (opcional)</label>
      <textarea id="sl-motivo" placeholder="Apresentação Bradesco Imóvel, fechamento, dúvidas..."></textarea>
    </div>

    <!-- Recorrência (só na criação) -->
    <div class="fld" id="fld-recorrencia">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:600;color:var(--text);text-transform:none;letter-spacing:0;font-size:13px">
        <input type="checkbox" id="sl-recorrente" style="width:auto;margin:0" onchange="toggleRecorrencia(this.checked)">
        Repetir toda semana
      </label>
      <div id="opcoes-recorrencia" style="display:none;margin-top:10px;padding-left:24px">
        <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;cursor:pointer;margin-bottom:6px">
          <input type="radio" name="sl-tipo-rec" value="semanas" checked onchange="document.getElementById('sl-semanas').disabled = false">
          Por <input type="number" id="sl-semanas" value="12" min="1" max="52" style="width:60px;padding:3px 8px;margin:0 4px"> semanas
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;cursor:pointer">
          <input type="radio" name="sl-tipo-rec" value="semfim" onchange="document.getElementById('sl-semanas').disabled = true">
          <strong>Sem fim</strong> — repete até alguém cancelar (auto-renovado)
        </label>
      </div>
    </div>

    <!-- Info sobre série (na edição) -->
    <div class="fld" id="fld-serie" style="display:none">
      <div style="background:var(--blue-bg);border:1px solid var(--blue);padding:10px 14px;border-radius:8px;font-size:12.5px;color:var(--blue)">
        🔁 Esta reserva faz parte de uma <strong>série recorrente</strong>. Você pode editar só essa ocorrência ou cancelar a série inteira.
      </div>
    </div>

    <div class="modal-foot">
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-del" id="btn-del" onclick="deletarReserva(false)" style="display:none">Cancelar reserva</button>
        <button class="btn-del" id="btn-del-serie" onclick="deletarReserva(true)" style="display:none">Cancelar série</button>
        <button class="btn-cancel" id="btn-liberar" onclick="liberarAgora()" style="display:none;color:var(--amber);border-color:var(--amber)">Liberar agora (acabou)</button>
      </div>
      <div style="flex:1"></div>
      <button class="btn-cancel" onclick="fecharModal()">Fechar</button>
      <button class="btn-save" id="btn-save" onclick="salvarReserva()">Salvar</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jhwciwvgagnuxakukyob.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fy-iwSFNHKRuqP1pDokFuQ_X_UCiqzx';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let allUsers = [];
let allReservas = [];
let allSalas = [];          // todas as salas ativas
let currentSalaId = null;   // sala atualmente em visualização
let viewDate = startOfToday();   // dia visualizado na agenda
let weekStart = startOfWeek(viewDate);  // segunda da semana
let editingId = null;

// Paleta de cores agradáveis pra atribuir aos consultores
const PALETTE = [
  '#2563EB', '#16A34A', '#D97706', '#9333EA', '#0891B2',
  '#DB2777', '#65A30D', '#0F766E', '#7C3AED', '#E11D48',
  '#0284C7', '#CA8A04', '#059669', '#6366F1', '#EA580C', '#14B8A6'
];

function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (h*31 + s.charCodeAt(i)) >>> 0; return h; }
function corDoConsultor(authId, nome) {
  if (!authId && !nome) return PALETTE[0];
  return PALETTE[hashStr(authId || nome) % PALETTE.length];
}

function startOfToday() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function startOfWeek(d) {
  // segunda como início
  const x = new Date(d); x.setHours(0,0,0,0);
  const dow = (x.getDay() + 6) % 7;  // 0 = segunda
  x.setDate(x.getDate() - dow);
  return x;
}
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function sameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function fmtHora(d) { return d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}); }
function fmtDataLong(d) { return d.toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long'}); }
function toLocalDatetimeInput(d) {
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    document.getElementById('main').innerHTML = '<div class="sl-head"><div class="sl-title">Sessão expirada</div></div>';
    if (window.top !== window.self) { try { window.top.location.reload(); } catch(e) {} }
    return;
  }
  const { data: profile } = await sb.from('portal_users').select('auth_id, nome, tipo').eq('auth_id', session.user.id).single();
  if (!profile) {
    document.getElementById('main').innerHTML = '<div class="sl-head"><div class="sl-title">Usuário não encontrado</div></div>';
    return;
  }
  currentUser = profile;
  await loadData();
  render();
  // Auto-renova séries "sem fim" em background
  autoRenovarSeries().then(() => loadData().then(render));
  // Atualiza a cada 30s pra status "agora" não ficar velho
  setInterval(() => { loadData().then(render); }, 30000);
}

async function loadData() {
  // Lista de salas ativas (no futuro pode ter várias)
  const { data: salas } = await sb.from('portal_salas')
    .select('*')
    .eq('ativa', true)
    .order('ordem');
  allSalas = salas || [];
  if (!currentSalaId && allSalas.length) currentSalaId = allSalas[0].id;

  // Lista de usuários que podem ter reserva
  const { data: users } = await sb.from('portal_users')
    .select('auth_id, nome, tipo')
    .not('auth_id', 'is', null)
    .order('nome');
  allUsers = users || [];

  // Reservas: últimos 7 dias + próximos 60 dias (todas as salas, filtra na UI)
  const desde = new Date(); desde.setDate(desde.getDate() - 7);
  const ate   = new Date(); ate.setDate(ate.getDate() + 60);
  const { data: rs } = await sb.from('portal_sala_reservas')
    .select('*')
    .gte('inicio', desde.toISOString())
    .lte('inicio', ate.toISOString())
    .eq('cancelada', false)
    .order('inicio');
  allReservas = rs || [];
}

function reservasDaSala() {
  return allReservas.filter(r => !currentSalaId || r.sala_id === currentSalaId);
}

function getStatusAgora() {
  const now = new Date();
  const ativa = allReservas.find(r => new Date(r.inicio) <= now && new Date(r.fim) > now);
  const proxima = allReservas.find(r => new Date(r.inicio) > now);
  return { ativa, proxima, now };
}

function render() {
  const { ativa, proxima, now } = getStatusAgora();
  // 1) STATUS HEADER
  let statusHtml = '';
  if (ativa) {
    const ehMinha = ativa.consultor_auth_id === currentUser.auth_id;
    const cls = ehMinha ? 'minha' : 'ocupada';
    const icon = ehMinha ? '🟡' : '🔴';
    const minutos = Math.floor((new Date(ativa.fim) - now) / 60000);
    statusHtml = `
      <div class="status-now ${cls}">
        <div class="status-icon">${icon}</div>
        <div style="flex:1;min-width:200px">
          <div class="status-title">${ehMinha ? 'Sua reserva está em andamento' : 'Sala em uso por ' + escapeHtml(ativa.consultor_nome)}</div>
          <div class="status-sub">
            Até ${fmtHora(new Date(ativa.fim))} ${minutos > 0 ? '· faltam ' + minutos + ' min' : '· ATRASADO'}
            ${ativa.cliente_nome ? ' · Cliente: ' + escapeHtml(ativa.cliente_nome) : ''}
          </div>
        </div>
        ${proxima ? `
          <div style="font-size:12px;color:var(--text2);text-align:right">
            <div style="font-weight:700">Próxima: ${escapeHtml(proxima.consultor_nome)}</div>
            <div>${fmtHora(new Date(proxima.inicio))}</div>
          </div>
        ` : ''}
      </div>
    `;
  } else if (proxima) {
    const minAteProxima = Math.floor((new Date(proxima.inicio) - now) / 60000);
    statusHtml = `
      <div class="status-now livre">
        <div class="status-icon">🟢</div>
        <div style="flex:1">
          <div class="status-title">Sala LIVRE agora</div>
          <div class="status-sub">
            Próxima reserva: ${escapeHtml(proxima.consultor_nome)} às ${fmtHora(new Date(proxima.inicio))}
            ${minAteProxima < 120 ? ' · em ' + minAteProxima + ' min' : ''}
          </div>
        </div>
      </div>
    `;
  } else {
    statusHtml = `
      <div class="status-now livre">
        <div class="status-icon">🟢</div>
        <div><div class="status-title">Sala LIVRE</div><div class="status-sub">Sem reservas próximas</div></div>
      </div>
    `;
  }

  // 2) MINI-CALENDÁRIO DA SEMANA
  const dias = [];
  for (let i = 0; i < 7; i++) {
    const d = addDays(weekStart, i);
    const cnt = allReservas.filter(r => sameDay(new Date(r.inicio), d)).length;
    dias.push({ d, cnt });
  }

  // 3) AGENDA DO DIA SELECIONADO
  const reservasDia = allReservas.filter(r => sameDay(new Date(r.inicio), viewDate));

  const HORA_INICIO = 6;
  const HORA_FIM   = 23;
  const TOTAL_HORAS = HORA_FIM - HORA_INICIO + 1;
  const PX_POR_HORA = 60;

  document.getElementById('main').innerHTML = `
    <div class="sl-head">
      <div>
        <div class="sl-title">Sala de Reunião</div>
        <div class="sl-subtitle">${allUsers.length} pessoas com acesso · reservas visíveis a todos</div>
      </div>
      <button class="btn-novo" onclick="abrirNovo()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova reserva
      </button>
    </div>

    ${statusHtml}

    <div class="week-nav">
      <div style="display:flex;gap:6px">
        <button onclick="navWeek(-1)">‹ Semana anterior</button>
        <button onclick="navWeek(0)">Hoje</button>
        <button onclick="navWeek(1)">Próxima ›</button>
      </div>
      <div class="week-label">
        ${weekStart.toLocaleDateString('pt-BR', {day:'2-digit', month:'short'})}
        — ${addDays(weekStart, 6).toLocaleDateString('pt-BR', {day:'2-digit', month:'short', year:'numeric'})}
      </div>
    </div>

    <div class="mini-week">
      ${dias.map(({d, cnt}) => `
        <div class="mini-day ${sameDay(d, viewDate) ? 'active' : ''} ${sameDay(d, new Date()) ? 'today' : ''}"
             onclick='selecionarDia(${d.getTime()})'>
          <div class="dow">${d.toLocaleDateString('pt-BR', {weekday: 'short'}).replace('.','')}</div>
          <div class="num">${d.getDate()}</div>
          <div class="cnt">${cnt === 0 ? '—' : (cnt + ' reserva' + (cnt > 1 ? 's' : ''))}</div>
        </div>
      `).join('')}
    </div>

    <div class="agenda">
      <div class="agenda-head">
        <div class="agenda-title">${fmtDataLong(viewDate)} ${sameDay(viewDate, new Date()) ? '<span class="day-of-week">· hoje</span>' : ''}</div>
        <div style="font-size:12px;color:var(--text2)">${reservasDia.length} reserva${reservasDia.length !== 1 ? 's' : ''}</div>
      </div>
      ${reservasDia.length === 0 ? `<div class="tl-empty-msg">Nenhuma reserva nesse dia. Clica em qualquer horário pra reservar.</div>` : ''}
      <div class="timeline" id="timeline" style="height:${TOTAL_HORAS * PX_POR_HORA}px" onclick='cliqueTimeline(event)'>
        ${Array.from({length: TOTAL_HORAS}, (_, i) => `
          <div class="tl-hour"><span class="tl-hour-label">${String(HORA_INICIO + i).padStart(2,'0')}:00</span></div>
        `).join('')}
        ${(sameDay(viewDate, new Date()) && now.getHours() >= HORA_INICIO && now.getHours() <= HORA_FIM) ? `
          <div class="tl-now-line" style="top:${((now.getHours() - HORA_INICIO) + now.getMinutes()/60) * PX_POR_HORA}px"></div>
        ` : ''}
        ${reservasDia.map(r => {
          const ini = new Date(r.inicio);
          const fim = new Date(r.fim);
          const topMin = (ini.getHours() - HORA_INICIO) * 60 + ini.getMinutes();
          const heightMin = (fim - ini) / 60000;
          const cor = corDoConsultor(r.consultor_auth_id, r.consultor_nome);
          const passada = fim < new Date();
          return `
            <div class="tl-event ${passada ? 'passed' : ''}"
                 style="top:${topMin}px; height:${Math.max(heightMin, 30)}px; background:${cor};"
                 onclick='event.stopPropagation(); abrirEditar(\`${r.id}\`)'>
              <div class="tl-event-time">${fmtHora(ini)} – ${fmtHora(fim)}</div>
              <div class="tl-event-name">${escapeHtml(r.consultor_nome)}</div>
              ${r.cliente_nome ? `<div class="tl-event-cli">${escapeHtml(r.cliente_nome)}</div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function selecionarDia(timestamp) {
  viewDate = new Date(timestamp);
  render();
}
function navWeek(delta) {
  if (delta === 0) {
    viewDate = startOfToday();
    weekStart = startOfWeek(viewDate);
  } else {
    weekStart = addDays(weekStart, delta * 7);
    viewDate = weekStart;
  }
  render();
}

// Clique em área vazia da timeline → abre modal pré-preenchido com horário do clique
function cliqueTimeline(ev) {
  const tl = document.getElementById('timeline');
  const rect = tl.getBoundingClientRect();
  const y = ev.clientY - rect.top;
  const HORA_INICIO = 6;
  const PX_POR_HORA = 60;
  const minutosTotais = Math.round(y / (PX_POR_HORA / 60));
  // Arredonda pra 15 min mais próximo
  const minAjustado = Math.round(minutosTotais / 15) * 15;
  const hora = HORA_INICIO + Math.floor(minAjustado / 60);
  const min  = minAjustado % 60;
  if (hora < 0 || hora > 23) return;
  const ini = new Date(viewDate); ini.setHours(hora, min, 0, 0);
  const fim = new Date(ini); fim.setHours(fim.getHours() + 1);
  abrirNovo(ini, fim);
}

// ═══ MODAL ═══
function abrirNovo(inicioDefault = null, fimDefault = null) {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Nova reserva';
  document.getElementById('modal-sub').textContent = 'Reservar a sala de reunião';
  document.getElementById('btn-del').style.display = 'none';
  document.getElementById('btn-del-serie').style.display = 'none';
  document.getElementById('btn-liberar').style.display = 'none';
  document.getElementById('btn-save').style.display = '';
  document.getElementById('fld-recorrencia').style.display = '';
  document.getElementById('fld-serie').style.display = 'none';
  document.getElementById('sl-recorrente').checked = false;
  document.getElementById('opcoes-recorrencia').style.display = 'none';
  document.getElementById('sl-semanas').disabled = true;
  document.querySelector('input[name="sl-tipo-rec"][value="semanas"]').checked = true;
  document.getElementById('sl-inicio').disabled = false;
  document.getElementById('sl-fim').disabled = false;
  document.getElementById('sl-cliente').disabled = false;
  document.getElementById('sl-motivo').disabled = false;
  document.getElementById('modal-conflict').style.display = 'none';

  // Dropdown de "reservar para" — só admin/master vê
  const podeMarcarParaOutros = currentUser.tipo === 'admin' || currentUser.tipo === 'master';
  const fldConsultor = document.getElementById('fld-consultor');
  fldConsultor.style.display = podeMarcarParaOutros ? '' : 'none';
  if (podeMarcarParaOutros) {
    const sel = document.getElementById('sl-consultor');
    sel.innerHTML = allUsers.map(u =>
      `<option value="${u.auth_id}" ${u.auth_id === currentUser.auth_id ? 'selected' : ''}>${escapeHtml(u.nome)} ${u.tipo === 'admin' ? '(admin)' : u.tipo === 'master' ? '(master)' : u.tipo === 'socio' ? '(sócio)' : u.tipo === 'parceiro' ? '(parceiro)' : ''}</option>`
    ).join('');
  }

  // Horários default: agora arredondado pra próximo 30min, fim = +1h
  const agora = new Date();
  const ini = inicioDefault || (() => {
    const d = new Date(agora);
    d.setMinutes(Math.ceil(d.getMinutes() / 30) * 30, 0, 0);
    return d;
  })();
  const fim = fimDefault || new Date(ini.getTime() + 60 * 60000);
  document.getElementById('sl-inicio').value = toLocalDatetimeInput(ini);
  document.getElementById('sl-fim').value    = toLocalDatetimeInput(fim);
  document.getElementById('sl-cliente').value = '';
  document.getElementById('sl-motivo').value = '';
  document.getElementById('modal-bg').classList.add('show');
  checarConflito();
}

function abrirEditar(id) {
  const r = allReservas.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  // Permissão pra editar: dono, criador ou master/admin
  const podeEditar = r.consultor_auth_id === currentUser.auth_id
                  || r.criado_por_auth_id === currentUser.auth_id
                  || ['master','admin'].includes(currentUser.tipo);
  const ehSerie = !!r.recorrente_id;
  const agora = new Date();
  const ativa = new Date(r.inicio) <= agora && new Date(r.fim) > agora;

  document.getElementById('modal-title').textContent = podeEditar ? (ehSerie ? 'Editar reserva (série)' : 'Editar reserva') : 'Detalhes da reserva';
  document.getElementById('modal-sub').textContent = `Por ${escapeHtml(r.consultor_nome)}${r.criado_por_nome && r.criado_por_nome !== r.consultor_nome ? ' · marcada por ' + escapeHtml(r.criado_por_nome) : ''}`;
  document.getElementById('btn-del').style.display       = podeEditar ? '' : 'none';
  document.getElementById('btn-del-serie').style.display = (podeEditar && ehSerie) ? '' : 'none';
  document.getElementById('btn-liberar').style.display   = (podeEditar && ativa) ? '' : 'none';
  document.getElementById('btn-save').style.display = podeEditar ? '' : 'none';
  document.getElementById('fld-recorrencia').style.display = 'none';  // não muda recorrência em edição
  document.getElementById('fld-serie').style.display = ehSerie ? '' : 'none';
  document.getElementById('modal-conflict').style.display = 'none';

  const podeMarcarParaOutros = ['master','admin'].includes(currentUser.tipo);
  const fldConsultor = document.getElementById('fld-consultor');
  fldConsultor.style.display = podeMarcarParaOutros ? '' : 'none';
  if (podeMarcarParaOutros) {
    const sel = document.getElementById('sl-consultor');
    sel.innerHTML = allUsers.map(u =>
      `<option value="${u.auth_id}" ${u.auth_id === r.consultor_auth_id ? 'selected' : ''}>${escapeHtml(u.nome)}</option>`
    ).join('');
  }
  document.getElementById('sl-inicio').value = toLocalDatetimeInput(new Date(r.inicio));
  document.getElementById('sl-fim').value    = toLocalDatetimeInput(new Date(r.fim));
  document.getElementById('sl-cliente').value = r.cliente_nome || '';
  document.getElementById('sl-motivo').value  = r.motivo || '';
  document.getElementById('sl-inicio').disabled = !podeEditar;
  document.getElementById('sl-fim').disabled    = !podeEditar;
  document.getElementById('sl-cliente').disabled = !podeEditar;
  document.getElementById('sl-motivo').disabled  = !podeEditar;
  document.getElementById('modal-bg').classList.add('show');
  checarConflito();
}

function checarConflito() {
  const iniStr = document.getElementById('sl-inicio').value;
  const fimStr = document.getElementById('sl-fim').value;
  if (!iniStr || !fimStr) return;
  const ini = new Date(iniStr);
  const fim = new Date(fimStr);
  if (fim <= ini) {
    showConflict('O fim precisa ser depois do início.');
    return;
  }
  const conflitos = allReservas.filter(r => {
    if (editingId && r.id === editingId) return false;
    const ri = new Date(r.inicio);
    const rf = new Date(r.fim);
    return ri < fim && rf > ini;
  });
  if (conflitos.length === 0) {
    document.getElementById('modal-conflict').style.display = 'none';
    return;
  }
  const c = conflitos[0];
  showConflict(`<strong>${escapeHtml(c.consultor_nome)}</strong> já reservou esse horário (${fmtHora(new Date(c.inicio))} – ${fmtHora(new Date(c.fim))}${c.cliente_nome ? ' · Cliente: ' + escapeHtml(c.cliente_nome) : ''}). Combine antes de confirmar.`);
}
function showConflict(html) {
  const el = document.getElementById('modal-conflict');
  el.innerHTML = `<div class="warn-conflict">⚠ ${html}</div>`;
  el.style.display = 'block';
}
['sl-inicio','sl-fim'].forEach(id => {
  document.addEventListener('change', e => { if (e.target.id === id) checarConflito(); });
});

function fecharModal() {
  document.getElementById('modal-bg').classList.remove('show');
  editingId = null;
}

function toggleRecorrencia(ativada) {
  document.getElementById('opcoes-recorrencia').style.display = ativada ? 'block' : 'none';
  const tipo = document.querySelector('input[name="sl-tipo-rec"]:checked')?.value;
  document.getElementById('sl-semanas').disabled = !ativada || tipo !== 'semanas';
}

// ═══ AUTO-RENOVAÇÃO DE SÉRIES "SEM FIM" ═══
// Quando a última ocorrência de uma série está em menos de 60 dias,
// cria mais 26 semanas pra manter "sem fim"
async function autoRenovarSeries() {
  try {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() + 60);
    // Pega séries com ÚLTIMA ocorrência em < 60 dias e que tenham >= 50 ocorrências (heurística pra "sem fim")
    const { data: series } = await sb.from('portal_sala_reservas')
      .select('recorrente_id')
      .not('recorrente_id', 'is', null)
      .eq('cancelada', false);
    if (!series || !series.length) return;
    const seriesIds = [...new Set(series.map(s => s.recorrente_id))];
    for (const sid of seriesIds) {
      const { data: ocs } = await sb.from('portal_sala_reservas')
        .select('*').eq('recorrente_id', sid).eq('cancelada', false)
        .order('inicio', { ascending: false }).limit(1);
      if (!ocs || !ocs.length) continue;
      const ultimaInicio = new Date(ocs[0].inicio);
      // Só auto-renova séries com >= 50 ocorrências (=sem fim) E última < 60 dias futuro
      const { count } = await sb.from('portal_sala_reservas')
        .select('id', { count: 'exact', head: true })
        .eq('recorrente_id', sid).eq('cancelada', false);
      if ((count || 0) < 50) continue;
      if (ultimaInicio > cutoff) continue;
      // Cria mais 26 semanas a partir da última
      const baseIni = new Date(ocs[0].inicio);
      const baseFim = new Date(ocs[0].fim);
      const novas = [];
      for (let i = 1; i <= 26; i++) {
        const i2 = new Date(baseIni); i2.setDate(i2.getDate() + 7*i);
        const f2 = new Date(baseFim); f2.setDate(f2.getDate() + 7*i);
        novas.push({
          consultor_auth_id: ocs[0].consultor_auth_id,
          consultor_nome: ocs[0].consultor_nome,
          criado_por_auth_id: ocs[0].criado_por_auth_id,
          criado_por_nome: ocs[0].criado_por_nome,
          sala_id: ocs[0].sala_id,
          cliente_nome: ocs[0].cliente_nome,
          motivo: ocs[0].motivo,
          recorrente_id: sid,
          inicio: i2.toISOString(),
          fim: f2.toISOString()
        });
      }
      await sb.from('portal_sala_reservas').insert(novas);
      console.log(`Auto-renovou série ${sid}: +${novas.length} semanas`);
    }
  } catch(e) { console.warn('auto-renovação:', e); }
}

async function salvarReserva() {
  const ini = document.getElementById('sl-inicio').value;
  const fim = document.getElementById('sl-fim').value;
  if (!ini || !fim) { showToast('Informe início e fim', true); return; }
  if (new Date(fim) <= new Date(ini)) { showToast('Fim precisa ser depois do início', true); return; }

  // Qual consultor — pode ser eu OU outro (admin/master)
  const podeMarcarOutro = ['master','admin'].includes(currentUser.tipo);
  let consultorAuthId, consultorNome;
  if (podeMarcarOutro) {
    consultorAuthId = document.getElementById('sl-consultor').value;
    const u = allUsers.find(x => x.auth_id === consultorAuthId);
    consultorNome = u?.nome || currentUser.nome;
  } else {
    consultorAuthId = currentUser.auth_id;
    consultorNome   = currentUser.nome;
  }

  const basePayload = {
    consultor_auth_id: consultorAuthId,
    consultor_nome: consultorNome,
    criado_por_auth_id: currentUser.auth_id,
    criado_por_nome: currentUser.nome,
    cliente_nome: document.getElementById('sl-cliente').value.trim() || null,
    motivo:       document.getElementById('sl-motivo').value.trim() || null
  };

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Salvando...';
  try {
    let res;
    if (editingId) {
      res = await sb.from('portal_sala_reservas').update({
        ...basePayload,
        inicio: new Date(ini).toISOString(),
        fim:    new Date(fim).toISOString()
      }).eq('id', editingId);
    } else {
      // Recorrência?
      const recorrente = document.getElementById('sl-recorrente').checked;
      if (recorrente) {
        const tipoRec = document.querySelector('input[name="sl-tipo-rec"]:checked')?.value || 'semanas';
        // Sem fim: cria 104 ocorrências (2 anos) — auto-renovação extende quando aproxima do fim
        const semanas = tipoRec === 'semfim' ? 104 : parseInt(document.getElementById('sl-semanas').value || '12', 10);
        const recorrenteId = crypto.randomUUID();
        const linhas = [];
        const baseIni = new Date(ini);
        const baseFim = new Date(fim);
        for (let i = 0; i < semanas; i++) {
          const i2 = new Date(baseIni); i2.setDate(i2.getDate() + 7 * i);
          const f2 = new Date(baseFim); f2.setDate(f2.getDate() + 7 * i);
          linhas.push({ ...basePayload, inicio: i2.toISOString(), fim: f2.toISOString(), recorrente_id: recorrenteId });
        }
        res = await sb.from('portal_sala_reservas').insert(linhas);
        if (!res.error) {
          if (tipoRec === 'semfim') showToast('Reserva sem fim criada (2 anos, auto-renova)!');
          else showToast(`${semanas} reservas criadas!`);
        }
      } else {
        res = await sb.from('portal_sala_reservas').insert({
          ...basePayload,
          inicio: new Date(ini).toISOString(),
          fim:    new Date(fim).toISOString()
        });
        if (!res.error) showToast('Reserva criada!');
      }
    }
    if (res.error) throw res.error;
    if (editingId) showToast('Reserva atualizada!');
    fecharModal();
    await loadData();
    render();
  } catch(e) {
    showToast('Erro: ' + (e.message || e), true);
  } finally {
    btn.disabled = false; btn.textContent = 'Salvar';
  }
}

async function deletarReserva(serieToda = false) {
  if (!editingId) return;
  const r = allReservas.find(x => x.id === editingId);
  if (!r) return;
  if (serieToda) {
    if (!r.recorrente_id) return;
    if (!confirm('Cancelar TODA A SÉRIE recorrente? Isso remove todas as ocorrências futuras e passadas com esse recorrente.')) return;
    try {
      const { error } = await sb.from('portal_sala_reservas').delete().eq('recorrente_id', r.recorrente_id);
      if (error) throw error;
      showToast('Série cancelada');
    } catch(e) { showToast('Erro: ' + (e.message || e), true); return; }
  } else {
    if (!confirm('Cancelar essa reserva? Essa ação remove só essa ocorrência.')) return;
    try {
      const { error } = await sb.from('portal_sala_reservas').delete().eq('id', editingId);
      if (error) throw error;
      showToast('Reserva cancelada');
    } catch(e) { showToast('Erro: ' + (e.message || e), true); return; }
  }
  fecharModal();
  await loadData();
  render();
}

// "Liberar agora" — encurta o fim pra o horário atual (a sala ficou livre antes do previsto)
async function liberarAgora() {
  if (!editingId) return;
  if (!confirm('Marcar que a reunião acabou agora? A sala vai aparecer como LIVRE pros outros consultores imediatamente.')) return;
  try {
    const { error } = await sb.from('portal_sala_reservas')
      .update({ fim: new Date().toISOString() })
      .eq('id', editingId);
    if (error) throw error;
    showToast('Sala liberada — outros já podem usar');
    fecharModal();
    await loadData();
    render();
  } catch(e) { showToast('Erro: ' + (e.message || e), true); }
}

function showToast(msg, err = false) {
  const t = document.createElement('div');
  t.className = 'toast' + (err ? ' err' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target.id === 'modal-bg') fecharModal();
});

init();
</script>
