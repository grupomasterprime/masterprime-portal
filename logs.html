<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logs de Atividade</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --mp-navy:   #2D3F5E;
  --mp-yellow: #C8C84A;
  --mp-teal:   #4DBCC8;
  --bg:        #F4F6FA;
  --card:      #FFFFFF;
  --border:    #E2E8F0;
  --text:      #1E293B;
  --text2:     #64748B;
  --text3:     #94A3B8;
  --green:     #16A34A; --green-bg: #F0FDF4;
  --red:       #DC2626; --red-bg:   #FEF2F2;
  --amber:     #D97706; --amber-bg: #FFFBEB;
  --blue:      #2563EB; --blue-bg:  #EFF6FF;
  --purple:    #7C3AED; --purple-bg:#F5F3FF;
  --r: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px 28px; }

/* Header */
.lg-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.lg-title { font-size: 22px; font-weight: 700; color: var(--mp-navy); }
.lg-subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* Filtros */
.lg-toolbar { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.lg-field { display: flex; flex-direction: column; gap: 4px; }
.lg-field label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; font-weight: 700; color: var(--text3); }
.lg-field select { border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; font-size: 13px; font-family: inherit; outline: 0; background: #fff; color: var(--text); cursor: pointer; min-width: 150px; }
.lg-field select:focus { border-color: var(--mp-teal); }
.lg-count { margin-left: auto; font-size: 12px; color: var(--text2); font-weight: 600; }

/* Lista */
.lg-list { background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.lg-row { display: grid; grid-template-columns: 170px 1.3fr 130px 2fr; gap: 14px; padding: 13px 18px; border-bottom: 1px solid var(--border); align-items: center; transition: background .12s; }
.lg-row:last-child { border-bottom: 0; }
.lg-row:hover { background: var(--bg); }
.lg-row.header { background: var(--bg); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; font-weight: 700; color: var(--text3); padding: 12px 18px; }
.lg-data { font-size: 12.5px; color: var(--text2); font-family: 'DM Mono', monospace; }
.lg-user { font-weight: 700; font-size: 13px; color: var(--text); }
.lg-det  { font-size: 12.5px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lg-chip { display: inline-block; padding: 4px 10px; border-radius: 14px; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; }
.lg-chip.login          { background: var(--green-bg);  color: var(--green); }
.lg-chip.logout         { background: #F1F5F9;          color: var(--text2); }
.lg-chip.ficha_criada   { background: var(--blue-bg);   color: var(--blue); }
.lg-chip.ficha_editada  { background: var(--amber-bg);  color: var(--amber); }
.lg-chip.pdf_gerado     { background: var(--red-bg);    color: var(--red); }
.lg-chip.simulacao_salva{ background: var(--purple-bg); color: var(--purple); }
.lg-chip.tela           { background: #ECFEFF;          color: #0E7490; }
.lg-chip.login_negado   { background: var(--red-bg);    color: var(--red); }
.lg-chip.ficha_excluida { background: var(--red-bg);    color: var(--red); }
.lg-chip.ficha_status   { background: var(--blue-bg);   color: var(--blue); }
.lg-chip.usuario_acao   { background: var(--amber-bg);  color: var(--amber); }
.lg-chip.reserva_criada { background: var(--green-bg);  color: var(--green); }
.lg-chip.reserva_cancelada { background: #F1F5F9;       color: var(--text2); }
.lg-chip.feedback_enviado{ background: var(--purple-bg); color: var(--purple); }
.lg-chip.outro          { background: #F1F5F9;          color: var(--text2); }

/* Empty / loading */
.empty { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty svg { color: var(--text3); margin-bottom: 12px; }
.empty h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
.empty p { font-size: 13px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2.5px solid var(--border); border-top-color: var(--mp-teal); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 800px) {
  .lg-row {
    grid-template-columns: 1fr auto;
    grid-template-areas: "user chip" "data data" "det det";
    gap: 4px 10px; padding: 12px;
  }
  .lg-row.header { display: none; }
  .lg-row > :nth-child(1) { grid-area: data; }
  .lg-row > :nth-child(2) { grid-area: user; }
  .lg-row > :nth-child(3) { grid-area: chip; justify-self: end; }
  .lg-row > :nth-child(4) { grid-area: det; white-space: normal; }
  .container { padding: 14px; }
  .lg-count { margin-left: 0; }
}
</style>
</head>
<body>

<div class="container" id="main">
  <div class="empty">
    <div class="spinner"></div>
    <p style="margin-top: 12px">Carregando logs...</p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jhwciwvgagnuxakukyob.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fy-iwSFNHKRuqP1pDokFuQ_X_UCiqzx';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allLogs = [];   // tudo carregado da RPC

// ═══ MAPA DE AÇÕES ═══
const ACOES = {
  login:           { label: 'Entrou',           cls: 'login' },
  logout:          { label: 'Saiu',             cls: 'logout' },
  ficha_criada:    { label: 'Criou ficha',      cls: 'ficha_criada' },
  ficha_editada:   { label: 'Editou ficha',     cls: 'ficha_editada' },
  pdf_gerado:      { label: 'Gerou PDF',        cls: 'pdf_gerado' },
  simulacao_salva: { label: 'Salvou simulação', cls: 'simulacao_salva' },
  tela:            { label: 'Abriu tela',       cls: 'tela' },
  login_negado:    { label: 'Login negado',     cls: 'login_negado' },
  ficha_excluida:  { label: 'Excluiu ficha',    cls: 'ficha_excluida' },
  ficha_status:    { label: 'Mudou status',     cls: 'ficha_status' },
  usuario_acao:    { label: 'Gerenciou usuário',cls: 'usuario_acao' },
  reserva_criada:  { label: 'Reservou sala',    cls: 'reserva_criada' },
  reserva_cancelada:{ label: 'Cancelou reserva',cls: 'reserva_cancelada' },
  feedback_enviado:{ label: 'Enviou feedback',  cls: 'feedback_enviado' }
};
function acaoInfo(acao) {
  return ACOES[acao] || { label: acao || '—', cls: 'outro' };
}

// ═══ HELPERS ═══
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDataHora(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '—';
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

// ═══ INIT ═══
async function init() {
  try {
    const { data, error } = await sb.rpc('listar_logs', { p_limit: 800 });
    if (error) {
      // Sem permissão (RLS) ou erro de RPC
      document.getElementById('main').innerHTML = `
        <div class="empty">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <h3>Sem permissão para ver os logs.</h3>
          <p>Esta área é restrita ao Master.</p>
        </div>`;
      return;
    }
    allLogs = data || [];
    render();
  } catch(e) {
    document.getElementById('main').innerHTML = `
      <div class="empty">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <h3>Sem permissão para ver os logs.</h3>
        <p>Esta área é restrita a master, admin e sócios.</p>
      </div>`;
  }
}

// ═══ FILTROS (client-side) ═══
let _fPessoa = '';
let _fPeriodo = 'tudo';
let _fAcao = '';

function aplicarFiltros() {
  _fPessoa  = document.getElementById('f-pessoa').value;
  _fPeriodo = document.getElementById('f-periodo').value;
  _fAcao    = document.getElementById('f-acao').value;
  renderLista();
}

function logsFiltrados() {
  const agora = Date.now();
  const corte = {
    hoje: () => { const d = new Date(); d.setHours(0,0,0,0); return d.getTime(); },
    '7':  () => agora - 7  * 86400000,
    '30': () => agora - 30 * 86400000
  };
  return allLogs.filter(l => {
    if (_fPessoa && (l.usuario || '') !== _fPessoa) return false;
    if (_fAcao   && (l.acao || '')    !== _fAcao)   return false;
    if (_fPeriodo !== 'tudo') {
      const t = new Date(l.criado).getTime();
      if (isNaN(t) || t < corte[_fPeriodo]()) return false;
    }
    return true;
  });
}

// ═══ RENDER ═══
function render() {
  const pessoas = [...new Set(allLogs.map(l => l.usuario).filter(Boolean))].sort((a,b) => a.localeCompare(b));
  const acoesPresentes = [...new Set(allLogs.map(l => l.acao).filter(Boolean))];

  document.getElementById('main').innerHTML = `
    <div class="lg-header">
      <div>
        <div class="lg-title">Logs de Atividade</div>
        <div class="lg-subtitle">Registro de ações no portal — visível apenas para o Master</div>
      </div>
    </div>

    <div class="lg-toolbar">
      <div class="lg-field">
        <label>Pessoa</label>
        <select id="f-pessoa" onchange="aplicarFiltros()">
          <option value="">Todas</option>
          ${pessoas.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}
        </select>
      </div>
      <div class="lg-field">
        <label>Período</label>
        <select id="f-periodo" onchange="aplicarFiltros()">
          <option value="hoje">Hoje</option>
          <option value="7">Últimos 7 dias</option>
          <option value="30">Últimos 30 dias</option>
          <option value="tudo" selected>Tudo</option>
        </select>
      </div>
      <div class="lg-field">
        <label>Ação</label>
        <select id="f-acao" onchange="aplicarFiltros()">
          <option value="">Todas</option>
          ${acoesPresentes.map(a => `<option value="${escapeHtml(a)}">${escapeHtml(acaoInfo(a).label)}</option>`).join('')}
        </select>
      </div>
      <span class="lg-count" id="lg-count"></span>
    </div>

    <div id="lg-list-wrap"></div>
  `;
  renderLista();
}

function renderLista() {
  const rows = logsFiltrados(); // já vem newest-first da RPC
  document.getElementById('lg-count').textContent =
    `${rows.length} registro${rows.length !== 1 ? 's' : ''}`;

  const wrap = document.getElementById('lg-list-wrap');
  if (!rows.length) {
    wrap.innerHTML = `
      <div class="lg-list">
        <div class="empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          <h3>Nenhum registro</h3>
          <p>Nenhuma atividade encontrada para os filtros selecionados.</p>
        </div>
      </div>`;
    return;
  }
  wrap.innerHTML = `
    <div class="lg-list">
      <div class="lg-row header">
        <div>Data/Hora</div>
        <div>Usuário</div>
        <div>Ação</div>
        <div>Detalhe</div>
      </div>
      ${rows.map(l => {
        const a = acaoInfo(l.acao);
        return `
        <div class="lg-row">
          <div class="lg-data">${fmtDataHora(l.criado)}</div>
          <div class="lg-user">${escapeHtml(l.usuario || '—')}</div>
          <div><span class="lg-chip ${a.cls}">${escapeHtml(a.label)}</span></div>
          <div class="lg-det" title="${escapeHtml(l.detalhe || '')}">${escapeHtml(l.detalhe || '—')}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

init();
</script>
</body>
</html>
