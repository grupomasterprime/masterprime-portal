<style id="fat-styles">
/* ── Faturamento: Filtros ── */
.fat-filtros {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  align-items: flex-end;
}
.fat-filtros input,
.fat-filtros select {
  padding: 8px 12px;
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: var(--text);
  background: var(--card);
  outline: none;
  transition: border-color .2s;
}
.fat-filtros input:focus,
.fat-filtros select:focus { border-color: var(--mp-teal); }
.fat-filtros input { min-width: 200px; }

/* ── Faturamento: Cards de métricas ── */
.fat-stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.fat-stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  box-shadow: var(--shadow);
}
.fat-stat-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text2);
  margin-bottom: 6px;
}
.fat-stat-valor {
  font-size: 26px;
  font-weight: 800;
  color: var(--mp-navy);
  font-family: 'DM Mono', monospace;
  line-height: 1;
}
.fat-stat-sub {
  font-size: 9px;
  color: var(--text3);
  margin-top: 4px;
}
.fat-stat.borda-teal    { border-top: 3px solid var(--mp-teal); }
.fat-stat.borda-amber   { border-top: 3px solid var(--amber); }
.fat-stat.borda-purple  { border-top: 3px solid var(--purple, #7C3AED); }
.fat-stat.borda-green   { border-top: 3px solid var(--green); }

/* ── Faturamento: Painel de detalhe ── */
.fat-detalhe-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, .55);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn .15s ease;
}
.fat-detalhe-overlay.aberto { display: flex; }
.fat-detalhe-modal {
  background: white;
  border-radius: 14px;
  width: 100%;
  max-width: 860px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 25px 60px rgba(0,0,0,.3);
  animation: slideUp .2s ease;
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.fat-detalhe-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  position: sticky;
  top: 0;
  background: white;
  z-index: 1;
}
.fat-detalhe-body { padding: 24px; }
.fat-detalhe-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-top: 20px;
}
@media (max-width: 640px) {
  .fat-detalhe-grid { grid-template-columns: 1fr; }
}

/* ── Faturamento: Stepper (no detalhe) ── */
.fat-stepper {
  display: flex;
  align-items: center;
  gap: 0;
  margin: 16px 0 20px;
  overflow-x: auto;
  padding: 4px 0 8px;
}
.fat-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  min-width: 60px;
  position: relative;
}
.fat-step:not(:last-child)::after {
  content: '';
  position: absolute;
  top: 13px;
  left: calc(50% + 14px);
  right: calc(-50% + 14px);
  height: 2px;
  background: var(--border);
  z-index: 0;
}
.fat-step.ok:not(:last-child)::after { background: var(--mp-teal); }
.fat-step-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  z-index: 1;
  position: relative;
  transition: all .25s;
}
.fat-step.ok .fat-step-dot   { background: var(--mp-teal); border-color: var(--mp-teal); color: white; }
.fat-step.now .fat-step-dot  { background: var(--mp-navy); border-color: var(--mp-navy); color: white; box-shadow: 0 0 0 3px rgba(45,63,94,.15); }
.fat-step-lbl {
  font-size: 8px;
  font-weight: 600;
  color: var(--text3);
  text-align: center;
  margin-top: 5px;
  max-width: 60px;
  line-height: 1.2;
  text-transform: uppercase;
}
.fat-step.ok .fat-step-lbl { color: var(--mp-teal); }
.fat-step.now .fat-step-lbl { color: var(--mp-navy); }

/* ── Linha de dado (label + valor) ── */
.fat-dado { display: flex; flex-direction: column; gap: 2px; margin-bottom: 12px; }
.fat-dado-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text2); }
.fat-dado-valor { font-size: 13px; color: var(--text); }

/* ── Historico no modal ── */
.fat-hist-item {
  display: flex;
  gap: 10px;
  padding-bottom: 12px;
  position: relative;
}
.fat-hist-item:not(:last-child)::before {
  content: '';
  position: absolute;
  left: 13px; top: 28px; bottom: 0;
  width: 2px;
  background: var(--border);
}
.fat-hist-dot {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--blue-bg); border: 2px solid var(--blue);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; flex-shrink: 0; z-index: 1;
}
.fat-hist-corpo {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
}

/* ── Timeline de mensagens (no modal) ── */
.fat-msgs-wrap { max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.fat-msg { display: flex; gap: 8px; }
.fat-msg.admin { flex-direction: row-reverse; }
.fat-msg-av {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 12px;
}
.fat-msg.cliente .fat-msg-av { background: var(--blue-bg); }
.fat-msg.admin   .fat-msg-av { background: var(--green-bg); }
.fat-msg-balao {
  max-width: 80%;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 11px;
  line-height: 1.4;
}
.fat-msg.cliente .fat-msg-balao { background: white; border: 1px solid var(--border); border-top-left-radius: 3px; }
.fat-msg.admin   .fat-msg-balao { background: var(--mp-navy); color: white; border-top-right-radius: 3px; }
.fat-msg-hora { font-size: 9px; color: var(--text3); margin-top: 3px; }
.fat-msg.admin .fat-msg-hora { text-align: right; color: rgba(255,255,255,.45); }

@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
</style>

<!-- ══════════════════════════════════════════════════════
     3. JAVASCRIPT — cole antes de </script> no index.html

<script id="fat-script">
// ════════════════════════════════════════════════════════════
//  MÓDULO DE FATURAMENTO
//  Todas as funções têm prefixo "fat" para não conflitar com o resto do index.html
// ════════════════════════════════════════════════════════════

// ─── Etapas do processo (mesmas do cliente.html) ───
// ➕ Para adicionar/remover etapas: altere APENAS este array
const FAT_ETAPAS = [
  { status: 'Recebido',                     icone: '📥' },
  { status: 'Em análise',                   icone: '🔍' },
  { status: 'Enviado para administradora',  icone: '📤' },
  { status: 'Em retorno da administradora', icone: '🔄' },
  { status: 'Finalizado',                   icone: '✅' },
];

// Cache dos processos carregados
let fatProcessos  = [];
let fatFiltrados  = [];

// ════════════════════════════════════════════════════════════
// CARREGAMENTO PRINCIPAL
// ════════════════════════════════════════════════════════════

async function renderAdminFaturamento() {
  // Busca todos os processos + contagem de mensagens não lidas
  const { data, error } = await sb
    .from('portal_processos')
    .select(`
      *,
      portal_arquivos(count),
      portal_mensagens(count)
    `)
    .order('criado_em', { ascending: false });

  if (error) {
    document.getElementById('fat-tbody').innerHTML = `
      <tr><td colspan="7" style="text-align:center;color:var(--red);padding:24px;">
        Erro ao carregar: ${error.message}
      </td></tr>`;
    return;
  }

  fatProcessos = data || [];
  fatFiltrados = [...fatProcessos];

  fatRenderStats();
  fatRenderTabela(fatFiltrados);
}

// ════════════════════════════════════════════════════════════
// MÉTRICAS / DASHBOARD
// ════════════════════════════════════════════════════════════

function fatRenderStats() {
  const total        = fatProcessos.length;
  const recebidos    = fatProcessos.filter(p => p.status === 'Recebido').length;
  const emAnalise    = fatProcessos.filter(p => p.status === 'Em análise').length;
  const emRetorno    = fatProcessos.filter(p => p.status === 'Em retorno da administradora').length;
  const finalizados  = fatProcessos.filter(p => p.status === 'Finalizado').length;
  const semProtocolo = fatProcessos.filter(p => !p.protocolo).length;

  document.getElementById('fat-stats').innerHTML = `
    <div class="fat-stat borda-teal">
      <div class="fat-stat-label">Total</div>
      <div class="fat-stat-valor">${total}</div>
      <div class="fat-stat-sub">processos</div>
    </div>
    <div class="fat-stat borda-amber">
      <div class="fat-stat-label">Recebidos</div>
      <div class="fat-stat-valor">${recebidos}</div>
      <div class="fat-stat-sub">aguardando análise</div>
    </div>
    <div class="fat-stat borda-purple">
      <div class="fat-stat-label">Em análise</div>
      <div class="fat-stat-valor">${emAnalise}</div>
      <div class="fat-stat-sub">em andamento</div>
    </div>
    <div class="fat-stat borda-amber">
      <div class="fat-stat-label">Retorno adm.</div>
      <div class="fat-stat-valor">${emRetorno}</div>
      <div class="fat-stat-sub">em retorno</div>
    </div>
    <div class="fat-stat borda-green">
      <div class="fat-stat-label">Finalizados</div>
      <div class="fat-stat-valor">${finalizados}</div>
      <div class="fat-stat-sub">concluídos</div>
    </div>
    ${semProtocolo > 0 ? `
    <div class="fat-stat" style="border-top:3px solid var(--red); cursor:pointer;" onclick="fatFiltrarSemProtocolo()" title="Clique para filtrar">
      <div class="fat-stat-label" style="color:var(--red);">⚠ Sem protocolo</div>
      <div class="fat-stat-valor" style="color:var(--red);">${semProtocolo}</div>
      <div class="fat-stat-sub">aguardando atribuição</div>
    </div>` : ''}
  `;
}

// Filtro rápido: mostra só processos sem protocolo
function fatFiltrarSemProtocolo() {
  fatFiltrados = fatProcessos.filter(p => !p.protocolo);
  fatRenderTabela(fatFiltrados);
  // Limpa filtros visuais para não confundir
  const busca = document.getElementById('fat-busca');
  const status = document.getElementById('fat-status-filtro');
  if (busca) busca.value = '⚠ Sem protocolo';
  if (status) status.value = '';
}

// ════════════════════════════════════════════════════════════
// TABELA DE PROCESSOS
// ════════════════════════════════════════════════════════════

function fatRenderTabela(lista) {
  const tbody = document.getElementById('fat-tbody');
  const cont  = document.getElementById('fat-contagem');
  cont.textContent = `${lista.length} processo${lista.length !== 1 ? 's' : ''} encontrado${lista.length !== 1 ? 's' : ''}`;

  if (lista.length === 0) {
    tbody.innerHTML = `
      <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text3);">
        Nenhum processo encontrado
      </td></tr>`;
    return;
  }

  tbody.innerHTML = lista.map(p => `
    <tr class="row-link" onclick="fatVerProcesso(${p.id})"
      style="${!p.protocolo ? 'background:#FFFBEB;' : ''}">
      <td>
        ${p.protocolo
          ? `<span class="mono" style="font-size:11px;font-weight:700;color:var(--mp-navy);">${p.protocolo}</span>`
          : `<button class="btn btn-xs btn-outline" style="color:var(--amber);border-color:var(--amber);"
               onclick="event.stopPropagation(); fatAtribuirProtocolo(${p.id})" title="Atribuir protocolo">
               ⚠ Atribuir protocolo
             </button>`
        }
      </td>
      <td>
        <div style="font-weight:600; font-size:12px;">${esc(p.nome)}</div>
      </td>
      <td>
        <span class="mono" style="font-size:11px;">${fmtCPF(p.cpf)}</span>
      </td>
      <td style="font-size:12px;">
        ${p.grupo ? `<span style="color:var(--text2)">G:</span> ${esc(p.grupo)}` : '—'}
        ${p.cota  ? ` &nbsp;<span style="color:var(--text2)">C:</span> ${esc(p.cota)}` : ''}
      </td>
      <td><span class="tag ${fatTagClass(p.status)}">${p.status}</span></td>
      <td>
        <span style="font-size:11px; color:var(--text2);">
          ${fmtDataBR(p.criado_em)}
        </span>
      </td>
      <td>
        <div style="display:flex; gap:4px;">
          <button class="btn btn-outline btn-xs" onclick="event.stopPropagation(); fatVerProcesso(${p.id})">
            Ver
          </button>
          <button class="btn btn-xs btn-outline" onclick="event.stopPropagation(); fatCopiarLink('${p.token}')"
            title="Copiar link do cliente">🔗</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// ════════════════════════════════════════════════════════════
// FILTROS
// ════════════════════════════════════════════════════════════

function fatFiltrar() {
  const busca  = document.getElementById('fat-busca')?.value.toLowerCase() || '';
  const status = document.getElementById('fat-status-filtro')?.value || '';

  fatFiltrados = fatProcessos.filter(p => {
    const texto = `${p.nome} ${p.cpf} ${p.protocolo} ${p.grupo||''} ${p.cota||''}`.toLowerCase();
    const bateBusca  = !busca  || texto.includes(busca);
    const bateStatus = !status || p.status === status;
    return bateBusca && bateStatus;
  });

  fatRenderTabela(fatFiltrados);
}

function fatLimparFiltros() {
  document.getElementById('fat-busca').value = '';
  document.getElementById('fat-status-filtro').value = '';
  fatFiltrar();
}

// ════════════════════════════════════════════════════════════
// MODAL DE DETALHE
// ════════════════════════════════════════════════════════════

async function fatVerProcesso(id) {
  const overlay = document.getElementById('fat-overlay');
  const modal   = document.getElementById('fat-modal');

  // Abre o modal com loading
  overlay.classList.add('aberto');
  modal.innerHTML = `
    <div style="padding:40px; text-align:center;">
      <div class="spinner spinner-dark" style="margin:0 auto 12px;width:36px;height:36px;border-width:3px;"></div>
      <p style="color:var(--text2);font-size:12px;">Carregando processo...</p>
    </div>`;

  // Busca dados completos
  const [
    { data: proc },
    { data: arqs },
    { data: msgs },
    { data: hist }
  ] = await Promise.all([
    sb.from('portal_processos').select('*').eq('id', id).single(),
    sb.from('portal_arquivos').select('*').eq('processo_id', id).order('criado_em'),
    sb.from('portal_mensagens').select('*').eq('processo_id', id).order('criado_em'),
    sb.from('portal_historico').select('*').eq('processo_id', id).order('criado_em', { ascending: false })
  ]);

  if (!proc) {
    modal.innerHTML = `<div style="padding:32px;text-align:center;color:var(--red);">Processo não encontrado.</div>`;
    return;
  }

  const idxAtual = FAT_ETAPAS.findIndex(e => e.status === proc.status);

  // ─── Status options ───
  const statusOpts = FAT_ETAPAS.map(e =>
    `<option value="${e.status}" ${proc.status === e.status ? 'selected' : ''}>${e.icone} ${e.status}</option>`
  ).join('') + `<option value="Cancelado" ${proc.status === 'Cancelado' ? 'selected' : ''}>❌ Cancelado</option>`;

  // ─── Arquivos ───
  const arqsHtml = (arqs||[]).length === 0
    ? '<p class="fat-dado-valor" style="color:var(--text3);font-size:11px;">Nenhum arquivo</p>'
    : (arqs||[]).map(a => {
        const url = sb.storage.from('arquivos').getPublicUrl(a.storage_path).data.publicUrl;
        const ico = fatIconeArq(a.nome_original);
        return `<div class="arquivo-item" style="margin-top:6px;">
          <span>${ico}</span>
          <a href="${url}" target="_blank" style="flex:1;font-size:11px;">${esc(a.nome_original)}</a>
          <button class="btn btn-xs btn-danger" onclick="fatDeletarArquivo(${a.id}, ${id})" title="Remover">✕</button>
        </div>`;
      }).join('');

  // ─── Mensagens ───
  const msgsHtml = (msgs||[]).length === 0
    ? '<p style="font-size:11px;color:var(--text3);text-align:center;padding:12px 0;">Sem mensagens ainda</p>'
    : (msgs||[]).map(m => {
        const lado = m.autor === 'admin' ? 'admin' : 'cliente';
        return `<div class="fat-msg ${lado}">
          <div class="fat-msg-av">${lado === 'admin' ? '👤' : '🙋'}</div>
          <div>
            <div class="fat-msg-balao">${esc(m.texto)}</div>
            <div class="fat-msg-hora">${lado === 'admin' ? 'Equipe' : 'Cliente'} · ${fmtDataHoraBR(m.criado_em)}</div>
          </div>
        </div>`;
      }).join('');

  // ─── Histórico ───
  const histHtml = (hist||[]).length === 0
    ? '<p style="font-size:11px;color:var(--text3);">Sem histórico</p>'
    : (hist||[]).map(h => `
        <div class="fat-hist-item">
          <div class="fat-hist-dot">${fatStatusIcone(h.status_novo)}</div>
          <div class="fat-hist-corpo">
            <span class="tag ${fatTagClass(h.status_novo)}" style="font-size:9px;">${h.status_novo}</span>

function fatFecharDetalhe(event) {
  if (event && event.target !== document.getElementById('fat-overlay')) return;
  document.getElementById('fat-overlay').classList.remove('aberto');
}

// AÇÕES DO ADMIN

// ─── Atribuir protocolo (ADM → processo criado pelo cliente) ───
async function fatAtribuirProtocolo(processoId) {
  // Fecha o modal se estiver aberto para o usuário ver a lista
  const proto = prompt(
    'Informe o número de protocolo para este processo:\n(Ex: MP-2024-0042)\n\nOu deixe em branco para gerar automaticamente.'
  );

  // Cancelou
  if (proto === null) return;

  let protocolo = proto.trim().toUpperCase() || null;

  // Gera automaticamente se deixou vazio
  if (!protocolo) {
    const ano = new Date().getFullYear();
    const { data: todos } = await sb
      .from('portal_processos')
      .select('protocolo')
      .like('protocolo', `MP-${ano}-%`);
    const numeros = (todos || [])
      .map(p => parseInt((p.protocolo || '').split('-')[2]) || 0);
    const proximo = (Math.max(0, ...numeros) + 1).toString().padStart(4, '0');
    protocolo = `MP-${ano}-${proximo}`;
  }

  // Verifica se já existe
  const { data: existe } = await sb
    .from('portal_processos')
    .select('id')
    .eq('protocolo', protocolo)
    .neq('id', processoId)
    .single();

  if (existe) {
    alert(`O protocolo "${protocolo}" já está em uso. Escolha outro.`);
    return;
  }

  const { error } = await sb
    .from('portal_processos')
    .update({ protocolo, atualizado_em: new Date() })
    .eq('id', processoId);

  if (error) { alert('Erro ao atribuir protocolo: ' + error.message); return; }

  alert(`Protocolo ${protocolo} atribuído com sucesso!\nO cliente verá o protocolo ao acessar o link.`);

  // Recarrega modal e tabela
  document.getElementById('fat-overlay').classList.remove('aberto');
  await renderAdminFaturamento();
}

// ─── Atualizar status ───
async function fatAtualizarStatus(processoId) {
  const novoStatus = document.getElementById(`fat-novo-status-${processoId}`)?.value;
  const obs        = document.getElementById(`fat-obs-status-${processoId}`)?.value.trim();

  if (!novoStatus) return;

  const { error: e1 } = await sb.from('portal_processos').update({
    status: novoStatus,
    atualizado_em: new Date()
  }).eq('id', processoId);

  if (e1) { alert('Erro ao atualizar status: ' + e1.message); return; }

  // Registra no histórico
  await sb.from('portal_historico').insert({
    processo_id: processoId,
    status_novo: novoStatus,
    observacao: obs || null,
    autor: typeof usuarioLogado !== 'undefined' ? usuarioLogado.nome : 'admin'
  });

  // Recarrega
  await fatVerProcesso(processoId);
  await renderAdminFaturamento();
}

// ─── Enviar mensagem (admin) ───
async function fatEnviarMsg(processoId) {
  const campo = document.getElementById(`fat-nova-msg-${processoId}`);
  const texto = campo?.value.trim();
  if (!texto) return;

  const { error } = await sb.from('portal_mensagens').insert({
    processo_id: processoId,
    autor: 'admin',
    texto
  });

  if (error) { alert('Erro ao enviar mensagem: ' + error.message); return; }
  campo.value = '';
  await fatVerProcesso(processoId);
}

// ─── Upload admin ───
async function fatUploadArquivos(processoId, token, input) {
  const files = Array.from(input.files);
  for (const arquivo of files) {
    if (arquivo.size > 16 * 1024 * 1024) { alert('"' + arquivo.name + '" é grande demais (máx 16MB)'); continue; }
    const path = `${token}/${Date.now()}_${arquivo.name}`;
    const { error: errUp } = await sb.storage.from('arquivos').upload(path, arquivo);
    if (errUp) { alert('Erro no upload: ' + errUp.message); continue; }
    await sb.from('portal_arquivos').insert({ processo_id: processoId, nome_original: arquivo.name, storage_path: path });
  }
  input.value = '';
  await fatVerProcesso(processoId);
}

// ─── Deletar arquivo ───
async function fatDeletarArquivo(arquivoId, processoId) {
  if (!confirm('Remover este arquivo?')) return;
  await sb.from('portal_arquivos').delete().eq('id', arquivoId);
  await fatVerProcesso(processoId);
}

// ─── Deletar processo ───
async function fatDeletarProcesso(id) {
  if (!confirm('Excluir este processo e todos os dados associados? Essa ação não pode ser desfeita.')) return;
  await sb.from('portal_mensagens').delete().eq('processo_id', id);
  await sb.from('portal_historico').delete().eq('processo_id', id);
  await sb.from('portal_arquivos').delete().eq('processo_id', id);
  const { error } = await sb.from('portal_processos').delete().eq('id', id);
  if (error) { alert('Erro ao excluir: ' + error.message); return; }
  document.getElementById('fat-overlay').classList.remove('aberto');
  await renderAdminFaturamento();
}

// ─── Copiar link do cliente ───
function fatCopiarLink(token) {
  const link = `${window.location.origin}/cliente.html?token=${token}`;
  navigator.clipboard.writeText(link).then(() => {
    // Tenta usar a função de toast do sistema, senão usa alert
    if (typeof showToast === 'function') showToast('Link copiado!');
    else alert('Link copiado: ' + link);
  });
}

// ─── Novo processo (admin inicia) ───
async function fatNovoProcesso() {
  const nome  = prompt('Nome do cliente:');
  if (!nome?.trim()) return;
  const cpf   = prompt('CPF do cliente (apenas números):')?.replace(/\D/g,'');
  if (!cpf || cpf.length < 11) { alert('CPF inválido.'); return; }
  const grupo = prompt('Grupo:') || '';
  const cota  = prompt('Cota:')  || '';

  const token = Math.random().toString(36).slice(2,10) + Date.now().toString(36);

  // Gera protocolo
  const { data: protoData } = await sb.rpc('gerar_protocolo').catch(() => ({ data: null }));
  const protocolo = protoData || `MP-${new Date().getFullYear()}-${Date.now().toString().slice(-4)}`;

  const { data: proc, error } = await sb.from('portal_processos').insert({
    token, protocolo, nome: nome.trim(), cpf, grupo, cota, status: 'Recebido'
  }).select().single();

  if (error) { alert('Erro: ' + error.message); return; }

  await sb.from('portal_historico').insert({
    processo_id: proc.id, status_novo: 'Recebido',
    observacao: 'Processo criado pelo administrativo.', autor: 'admin'
  });

  const link = `${window.location.origin}/cliente.html?token=${token}`;
  await navigator.clipboard.writeText(link).catch(() => {});
  alert(`Processo criado!\nProtocolo: ${protocolo}\n\nLink do cliente copiado para a área de transferência:\n${link}`);

  await renderAdminFaturamento();
}

// ─── Exportar CSV ───
function fatExportarCSV() {
  const lista = fatFiltrados.length > 0 ? fatFiltrados : fatProcessos;
  if (lista.length === 0) { alert('Nenhum processo para exportar.'); return; }

  const header = ['Protocolo','Nome','CPF','Grupo','Cota','Email','Telefone','Status','Criado em'];
  const linhas = lista.map(p => [
    p.protocolo,
    p.nome,
    fmtCPF(p.cpf),
    p.grupo || '',
    p.cota  || '',
    p.email || '',
    p.telefone || '',
    p.status,
    fmtDataBR(p.criado_em)
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));

  const csv = [header.join(','), ...linhas].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `processos-faturamento-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ➕ Para adicionar novo status com cor: adicione aqui e no CSS
function fatTagClass(s) {
  const m = {
    'Recebido':                      'tag-blue',
    'Em análise':                    'tag-amber',
    'Enviado para administradora':   'tag-purple',
    'Em retorno da administradora':  'tag-teal',
    'Finalizado':                    'tag-green',
    'Cancelado':                     'tag-red',
  };
  return m[s] || 'tag-gray';
}

function fatStatusIcone(s) {
  const e = FAT_ETAPAS.find(e => e.status === s);
  return e ? e.icone : '📌';
}

function fatIconeArq(nome) {
  const ext = String(nome||'').split('.').pop().toLowerCase();
  if (ext === 'pdf') return '📄';
  if (['jpg','jpeg','png'].includes(ext)) return '🖼️';
  return '📎';
}

// Formatação de datas para pt-BR
function fmtDataBR(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('pt-BR');
}
function fmtDataHoraBR(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('pt-BR', {
    day:'2-digit', month:'2-digit', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
}

// Escape HTML
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Formata CPF: 12345678900 → 123.456.789-00
function fmtCPF(c) {
  const s = String(c||'').replace(/\D/g,'');
  return s.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4') || s;
}

// Fechar modal com Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('fat-overlay')?.classList.remove('aberto');
});
