<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Prime — Portal do Cliente</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ===== ESTILOS (mantidos do original) ===== */
    :root{
      --mp-navy:#2D3F5E; --mp-navy-2:#1E2D45; --mp-teal:#4DBCC8; --mp-teal-2:#3AA7B3;
      --mp-yellow:#F4C24A; --mp-amber:#E89D3A;
      --bg:#F6F8FB; --card:#FFFFFF; --border:#E6EAF1; --border2:#D7DEE8;
      --text:#1A2030; --text2:#5A6478; --text3:#8C95A7;
      --green:#16A34A; --green-bg:#DCFCE7; --red:#DC2626; --red-bg:#FEE2E2;
      --blue:#2563EB; --blue-bg:#DBEAFE; --amber:#D97706; --amber-bg:#FEF3C7;
      --purple:#7C3AED; --purple-bg:#EDE9FE;
      --r:14px; --r-sm:8px;
      --shadow:0 1px 2px rgba(15,23,42,.04), 0 4px 12px rgba(15,23,42,.04);
      --shadow-lg:0 8px 24px rgba(15,23,42,.10);
      --fonte:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      --fonte-mono:'DM Mono',ui-monospace,Menlo,Consolas,monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:var(--fonte);
      color:var(--text); font-size:13px; line-height:1.5;
      background:
        radial-gradient(ellipse at top left, rgba(77,188,200,.10), transparent 55%),
        radial-gradient(ellipse at top right, rgba(244,194,74,.08), transparent 50%),
        linear-gradient(180deg, #FAFCFE 0%, #F4F7FB 100%);
      min-height:100vh; -webkit-font-smoothing:antialiased;
    }
    a{color:var(--mp-teal-2);text-decoration:none}
    a:hover{text-decoration:underline}

    .header{
      background:linear-gradient(135deg, var(--mp-navy) 0%, var(--mp-navy-2) 100%);
      padding:0 28px; height:68px;
      display:flex; align-items:center; justify-content:space-between;
      box-shadow:0 2px 14px rgba(45,63,94,.18);
      position:sticky; top:0; z-index:20;
    }
    .header-logo{display:flex;align-items:center;gap:10px}
    .header-logo img{height:38px;width:auto;display:block;filter:brightness(0) invert(1);}
    .header-right{display:flex;align-items:center;gap:14px}
    .header-tag{font-size:10px;font-weight:700;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:1.6px;}

    .container{max-width:960px;margin:0 auto;padding:36px 22px 80px}

    .card{
      background:var(--card); border-radius:var(--r);
      box-shadow:var(--shadow); border:1px solid var(--border);
      margin-bottom:18px; overflow:hidden;
    }
    .card-head{
      padding:18px 22px 14px; border-bottom:1px solid var(--border);
      display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
    }
    .card-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.1px;display:flex;align-items:center;gap:8px}
    .card-sub{font-size:11.5px;color:var(--text2);margin-top:3px;line-height:1.45}
    .card-body{padding:20px 22px}

    .footer-info{
      margin-top: 28px; padding: 24px;
      background: #FFFFFF; border: 1px solid var(--border);
      border-radius: 14px; font-size: 12px; color: var(--text2);
      line-height: 1.7; box-shadow: var(--shadow);
    }
    .footer-info h3{font-size: 14px;font-weight: 700;color: var(--mp-navy);margin-bottom: 12px;}
    .footer-info strong{ color: var(--text); }
    .footer-info ul{ padding-left: 20px; margin-bottom: 12px; }
    .footer-info li{ margin-bottom: 4px; }
    .footer-info .lgpd{margin-top: 16px;font-size: 11px;color: var(--text3);border-top: 1px solid var(--border);padding-top: 12px;}

    .ico{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:currentColor}
    .ico svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    .ico-lg{width:24px;height:24px}
    .ico-xl{width:34px;height:34px}

    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:11px 18px; border-radius:10px;
      font-family:inherit; font-size:12.5px; font-weight:600;
      cursor:pointer; border:none; transition:all .15s;
      text-decoration:none; line-height:1; white-space:nowrap;
    }
    .btn-primary{background:var(--mp-navy);color:#fff;box-shadow:0 2px 8px rgba(45,63,94,.18)}
    .btn-primary:hover{background:var(--mp-navy-2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(45,63,94,.22)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .btn-outline{background:#fff;color:var(--mp-navy);border:1.5px solid var(--border2)}
    .btn-outline:hover{border-color:var(--mp-navy);background:#F8FAFC}
    .btn-teal{background:var(--mp-teal);color:#fff;box-shadow:0 2px 8px rgba(77,188,200,.20)}
    .btn-teal:hover{background:var(--mp-teal-2)}
    .btn-sm{padding:8px 14px;font-size:11.5px;border-radius:8px}
    .btn-xs{padding:6px 11px;font-size:11px;border-radius:6px}
    .w-100{width:100%}

    .btn-cta{
      background:linear-gradient(135deg, var(--mp-teal) 0%, var(--mp-teal-2) 100%);
      color:#fff; font-size:14px; font-weight:700; padding:16px 24px;
      border-radius:12px; box-shadow:0 6px 20px rgba(77,188,200,.35);
      border:none; width:100%; cursor:pointer; transition:all .2s;
      display:inline-flex; align-items:center; justify-content:center; gap:10px;
    }
    .btn-cta:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(77,188,200,.45)}
    .btn-cta:active{transform:translateY(0)}

    .btn-secondary-link{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:11px 18px; border-radius:10px;
      font-family:inherit; font-size:12.5px; font-weight:600;
      cursor:pointer; border:1.5px solid var(--border2);
      background:#fff; color:var(--text2); transition:all .15s;
      width:100%;
    }
    .btn-secondary-link:hover{border-color:var(--mp-navy);color:var(--mp-navy);background:#F8FAFC}

    .campo{margin-bottom:14px}
    .campo label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
    .campo .req{color:var(--red)}
    .campo input,.campo textarea,.campo select{
      width:100%; padding:10px 13px;
      border:1.5px solid var(--border2); border-radius:8px;
      font-family:inherit; font-size:13px; color:var(--text);
      background:#fff; outline:none;
      transition:border-color .15s, box-shadow .15s;
    }
    .campo input:focus,.campo textarea:focus,.campo select:focus{border-color:var(--mp-teal); box-shadow:0 0 0 3px rgba(77,188,200,.14);}
    .campo input:disabled{background:#F8FAFC;color:var(--text3);cursor:not-allowed}
    .campo textarea{resize:vertical;min-height:64px;font-family:inherit}
    .campo .hint{font-size:11px;color:var(--text3);margin-top:4px}

    .checkbox-lgpd{
      display:flex; gap:12px; align-items:flex-start;
      background:#F9FAFB; padding:14px 16px; border-radius:10px;
      margin:12px 0; border:1px solid #E2E8F0;
    }
    .checkbox-lgpd input{margin-top:2px; width:18px; height:18px; cursor:pointer}
    .checkbox-lgpd label{font-size:12px; line-height:1.5; color:var(--text2); cursor:pointer}
    .checkbox-lgpd strong{color:var(--mp-navy)}

    .tipo-pessoa-selector{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
    .tipo-pessoa-btn{
      padding:14px 18px; border-radius:12px; border:2px solid var(--border2);
      background:#fff; cursor:pointer; transition:all .15s; text-align:center;
      font-family:inherit; font-size:13px; font-weight:600; color:var(--text2);
    }
    .tipo-pessoa-btn:hover{border-color:var(--mp-teal);color:var(--mp-teal)}
    .tipo-pessoa-btn.ativo{border-color:var(--mp-teal);background:#F0FAFD;color:var(--mp-teal)}
    .tipo-pessoa-btn .tipo-icon{font-size:24px;display:block;margin-bottom:6px;}
    .tipo-pessoa-btn .tipo-label{font-size:12px;font-weight:700;display:block;}
    .tipo-pessoa-btn .tipo-sub{font-size:10.5px;color:var(--text3);margin-top:2px;display:block;font-weight:400;}
    .tipo-pessoa-btn.ativo .tipo-sub{color:var(--mp-teal-2)}

    .alerta{
      display: none;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-top: 16px;
      border: 1px solid transparent;
      line-height: 1.5;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: all 0.3s;
    }
    .alerta.visivel{
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .alerta-erro{background: #FFF5F5;color: #C53030;border-color: #FEB2B2;}
    .alerta-aviso{background: #FFFFF0;color: #975A16;border-color: #F6E05E;}
    .alerta-sucesso{background: #F0FFF4;color: #276749;border-color: #9AE6B4;}
    .alerta-info{background: #EBF8FF;color: #2A4365;border-color: #90CDF4;}

    .tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px; font-size:10.5px; font-weight:700;border-radius:999px; line-height:1.3;background:#F1F5F9;color:var(--text2);}
    .tag-blue{background:var(--blue-bg);color:#1E40AF}
    .tag-amber{background:var(--amber-bg);color:#92400E}
    .tag-purple{background:var(--purple-bg);color:#5B21B6}
    .tag-teal{background:#CFFAFE;color:#0E7490}
    .tag-green{background:var(--green-bg);color:#166534}
    .tag-red{background:var(--red-bg);color:#991B1B}
    .tag-gray{background:#F1F5F9;color:var(--text2)}

    .start-wrap{max-width:520px;margin:30px auto 0;}
    .start-card{background:var(--card); border-radius:18px;box-shadow:var(--shadow-lg); border:1px solid var(--border);overflow:hidden;}
    .start-head{padding:34px 30px 26px; text-align:center;background:linear-gradient(180deg, #FAFCFE 0%, #FFFFFF 100%);border-bottom:1px solid var(--border);}
    .start-head .badge-icon{width:56px;height:56px;border-radius:14px;margin:0 auto 14px;background:linear-gradient(135deg, var(--mp-teal) 0%, var(--mp-teal-2) 100%);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 6px 16px rgba(77,188,200,.30);}
    .start-head h1{font-size:20px;font-weight:800;color:var(--mp-navy);margin-bottom:6px;letter-spacing:-.2px}
    .start-head p{font-size:12.5px;color:var(--text2)}
    .start-body{padding:24px 30px 28px}
    .start-divider{display:flex;align-items:center;gap:14px;margin:22px 0 16px;color:var(--text3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;}
    .start-divider::before,.start-divider::after{content:"";flex:1;height:1px;background:var(--border)}

    .proc-card-list{display:flex;flex-direction:column;gap:0}
    .proc-row{display:flex; align-items:center; gap:14px;padding:14px 18px; border-radius:10px;border:1px solid var(--border); background:#fff;cursor:pointer; transition:all .15s;text-decoration:none; color:inherit;}
    .proc-row+.proc-row{margin-top:8px}
    .proc-row:hover{border-color:var(--mp-teal);background:#F8FCFD;transform:translateX(2px)}
    .proc-info{flex:1;min-width:0}
    .proc-name{font-weight:700;font-size:13px;color:var(--text);margin-bottom:2px}
    .proc-meta{font-size:11px;color:var(--text2);display:flex;flex-wrap:wrap;gap:6px}
    .proc-meta .mono{font-family:var(--fonte-mono);font-weight:700;color:var(--text)}
    .proc-arrow{color:var(--text3);font-weight:700;font-size:14px}

    .stepper{background:#fff; border:1px solid var(--border); border-radius:14px;padding:24px 26px; margin-bottom:18px;display:flex; gap:0; box-shadow:var(--shadow);overflow-x:auto;}
    .step{display:flex; flex-direction:column; align-items:center;flex:1; min-width:90px; position:relative;}
    .step:not(:last-child)::after{content:""; position:absolute; top:16px; left:calc(50% + 18px); right:calc(-50% + 18px);height:2px; background:var(--border); z-index:0;}
    .step.concluido:not(:last-child)::after{background:var(--mp-teal)}
    .step-dot{width:36px;height:36px;border-radius:50%;border:2px solid var(--border); background:#fff;display:flex;align-items:center;justify-content:center;z-index:1; position:relative; transition:all .3s;color:var(--text3);}
    .step.concluido .step-dot{background:var(--mp-teal);border-color:var(--mp-teal);color:#fff}
    .step.atual .step-dot{background:var(--mp-navy); border-color:var(--mp-navy); color:#fff;box-shadow:0 0 0 5px rgba(45,63,94,.12);}
    .step-label{font-size:9.5px; font-weight:700; color:var(--text3);text-align:center; margin-top:8px; max-width:90px;line-height:1.3; text-transform:uppercase; letter-spacing:.4px;}
    .step.atual .step-label{color:var(--mp-navy)}
    .step.concluido .step-label{color:var(--mp-teal)}

    .tabs{display:flex; gap:2px; padding:4px;background:#F1F5F9; border-radius:12px;margin-bottom:20px;}
    .tab-btn{flex:1; padding:10px 14px;background:transparent; border:none;font-family:inherit; font-size:12px; font-weight:600;color:var(--text2); cursor:pointer;border-radius:9px; transition:all .15s;display:inline-flex; align-items:center; justify-content:center; gap:7px;white-space:nowrap;}
    .tab-btn:hover:not(.ativa){color:var(--text);background:rgba(255,255,255,.6)}
    .tab-btn.ativa{background:#fff;color:var(--mp-navy);box-shadow:0 2px 6px rgba(15,23,42,.06)}
    .tab-count{font-size:10px; padding:1px 6px; border-radius:999px;background:#E2E8F0; color:var(--text2); font-weight:700;}
    .tab-btn.ativa .tab-count{background:var(--mp-teal);color:#fff}
    .painel{display:none}
    .painel.ativo{display:block}

    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0 18px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 18px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:0 18px}

    .doc-slots{display:flex;flex-direction:column;gap:14px}
    .doc-slot{border:1.5px dashed var(--border2); border-radius:12px;padding:18px; transition:all .2s; background:#fff;}
    .doc-slot.preenchido{border-style:solid;border-color:var(--green);background:#F7FEF9}
    .doc-slot.opcional{border-color:#E2E8F0;background:#FAFBFD}
    .doc-slot.dragover{border-color:var(--mp-teal);background:#F0FAFB;transform:scale(1.005)}
    .doc-slot-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .doc-slot-icon{width:40px;height:40px;border-radius:10px;flex-shrink:0;background:#F1F5F9;color:var(--text2);display:flex;align-items:center;justify-content:center;}
    .doc-slot.preenchido .doc-slot-icon{background:var(--green-bg);color:var(--green)}
    .doc-slot-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
    .doc-slot-sub{font-size:11px;color:var(--text2);margin-top:2px}
    .doc-slot-action{margin-left:auto;display:flex;gap:6px;align-items:center}
    .doc-slot input[type=file]{display:none}
    .doc-slot-arquivo{display:flex; align-items:center; gap:10px;padding:8px 12px; background:#F1F5F9; border-radius:8px;font-size:12px; margin-top:6px;}
    .doc-slot-arquivo .nome{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .doc-slot-arquivo .remover{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 4px;}

    .arquivo-item{display:flex; align-items:center; gap:10px;padding:10px 14px; border-radius:8px;border:1px solid var(--border);margin-bottom:8px; background:#fff; font-size:12.5px;}
    .arquivo-item:hover{border-color:var(--mp-teal);background:#F8FCFD}
    .arquivo-item .file-ico{width:34px;height:34px;border-radius:8px;flex-shrink:0;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;}
    .arquivo-item .file-info{flex:1;min-width:0}
    .arquivo-item .file-name{font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .arquivo-item .file-meta{font-size:11px;color:var(--text2);margin-top:1px}

    .timeline{max-height:420px; overflow-y:auto; padding:8px 6px 8px 0;display:flex; flex-direction:column; gap:14px;}
    .timeline::-webkit-scrollbar{width:6px}
    .timeline::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
    .msg-item{display:flex;gap:10px;align-items:flex-start;max-width:85%}
    .msg-item.cliente{align-self:flex-end;flex-direction:row-reverse}
    .msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0; display:flex; align-items:center; justify-content:center;font-size:13px;font-weight:700; color:#fff;background:var(--mp-teal);}
    .msg-item.admin .msg-avatar{background:var(--mp-navy)}
    .msg-balao{padding:10px 14px; border-radius:14px;font-size:13px; line-height:1.5;background:var(--mp-teal);color:#fff;border-top-right-radius:4px;}
    .msg-item.admin .msg-balao{background:#F1F5F9;color:var(--text);border-top-right-radius:14px;border-top-left-radius:4px}
    .msg-hora{font-size:10.5px;color:var(--text3);margin-top:4px; padding:0 4px;}
    .msg-input-wrap{display:flex; gap:10px;margin-top:18px; padding-top:18px;border-top:1px solid var(--border);}
    .msg-input-wrap textarea{flex:1;padding:11px 14px;border:1.5px solid var(--border2); border-radius:10px;font-family:inherit;font-size:13px; resize:none;min-height:46px; max-height:120px; outline:none;transition:border-color .15s;}
    .msg-input-wrap textarea:focus{border-color:var(--mp-teal)}

    .hist-item{display:flex; gap:14px; padding:12px 0;border-bottom:1px solid var(--border);}
    .hist-item:last-child{border-bottom:none}
    .hist-dot{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;}
    .hist-content{flex:1}
    .hist-status{margin-bottom:4px}
    .hist-obs{font-size:12px;color:var(--text);margin-top:4px}
    .hist-hora{font-size:10.5px;color:var(--text3);margin-top:4px;font-family:var(--fonte-mono)}

    .empty{padding:30px 20px;text-align:center;color:var(--text3)}
    .empty-icon{width:48px;height:48px;border-radius:50%;background:#F1F5F9; margin:0 auto 12px;display:flex;align-items:center;justify-content:center;color:var(--text3);}
    .empty-msg{font-size:12.5px}

    .spinner{width:14px;height:14px;border:2px solid #E2E8F0;border-top-color:var(--mp-teal); border-radius:50%;display:inline-block; animation:spin .8s linear infinite;}
    .spinner-dark{border-color:#E2E8F0;border-top-color:var(--mp-navy)}
    .spinner-lg{width:32px;height:32px;border-width:3px}
    @keyframes spin{to{transform:rotate(360deg)}}

    .notif{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--mp-navy);color:#fff;padding:11px 22px;border-radius:999px;font-size:12.5px;font-weight:600;box-shadow:0 6px 18px rgba(0,0,0,.28);z-index:999; display:flex; align-items:center; gap:8px;animation:fadeUp .3s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}}
    @keyframes fadeIn{from{opacity:0}}

    #loading-page{min-height:calc(100vh - 62px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}

    .banco-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px; margin:24px 0;}
    .banco-card{background:#fff; border:2px solid var(--border);border-radius:16px; padding:28px 20px;text-align:center; cursor:pointer;transition:all .2s; box-shadow:var(--shadow);}
    .banco-card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.08);}
    .banco-card .banco-emoji{font-size:42px;margin-bottom:12px}
    .banco-card .banco-nome{font-size:18px;font-weight:800;margin-bottom:6px}
    .banco-card .banco-desc{font-size:12px;color:var(--text2)}
    .banco-card .banco-seta{margin-top:14px;font-weight:600;font-size:13px;color:var(--text3)}

    .secao-tipo-pessoa{
      background:linear-gradient(135deg, #F0F9FF 0%, #F8FCFE 100%);
      border:1px solid #BAE6FD; border-radius:12px;
      padding:18px 20px; margin-bottom:18px;
    }
    .secao-tipo-titulo{font-size:12px;font-weight:700;color:var(--mp-navy);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px;}

    .sucesso-box{background:var(--green-bg);border:1.5px solid #86EFAC;border-radius:14px;padding:20px 22px;margin-bottom:16px;}
    .sucesso-steps{counter-reset:step;display:flex;flex-direction:column;gap:10px;margin-top:12px;}

function gerarTokenSeguro() {
  const array = new Uint8Array(16);
  window.crypto.getRandomValues(array);
  return Array.from(array).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function consultarProcesso(){
  const raw = (document.getElementById('cpf-consulta').value||'').replace(/\D/g,'');
  if (raw.length < 11){ alerta('alerta-consulta','Informe um CPF (11 dígitos) ou CNPJ (14 dígitos) válido.','erro'); return; }
  const btn = document.querySelector('.btn-secondary-link');
  if (btn){ btn.disabled=true; btn.innerHTML = '<span class="spinner"></span> Buscando...'; }
  const { data, error } = await sb.rpc('cliente_listar_por_cpf', { p_cpf: raw });
  if (btn){ btn.disabled=false; btn.innerHTML = ico('search')+' Consultar processo em andamento'; }
  if (error){ alerta('alerta-consulta','Erro ao buscar. Tente novamente.','erro'); return; }
  if (!data || data.length===0){ alerta('alerta-consulta','Nenhum processo encontrado para este documento.','erro'); return; }
  if (data.length===1){ window.location.href = `?token=${data[0].token}`; return; }
  const lista = document.getElementById('lista-processos-cpf');
  lista.innerHTML = `
    <div class="card">
      <div class="card-head"><div><div class="card-title">Processos encontrados (${data.length})</div><div class="card-sub">Selecione qual deseja acompanhar</div></div></div>
      <div class="card-body" style="padding:14px">
        <div class="proc-card-list">
          ${data.map(p => `
            <a class="proc-row" href="?token=${esc(p.token)}">
              <div class="proc-info">
                <div class="proc-name">${esc(p.nome)}</div>
                <div class="proc-meta">
                  ${p.protocolo?`<span class="mono">${esc(p.protocolo)}</span>`:`<span style="color:var(--amber);font-weight:700">Protocolo pendente</span>`}
                  ${p.grupo?`<span>· Grupo ${esc(p.grupo)}</span>`:''}
                  ${p.cota?`<span>· Cota ${esc(p.cota)}</span>`:''}
                  <span>· ${fmtData(p.criado_em)}</span>
                </div>
              </div>
              <span class="tag ${tagClass(p.status)}">${esc(p.status)}</span>
              <span class="proc-arrow">→</span>
            </a>
          `).join('')}
        </div>
      </div>
    </div>`;
}

  tipoPessoa = tipo;
  document.querySelectorAll('.tipo-pessoa-btn').forEach(b => b.classList.remove('ativo'));
  const btn = document.getElementById('btn-tp-' + tipo);
  if (btn) btn.classList.add('ativo');
  const campoCpf  = document.getElementById('bloco-cpf');
  const campoCnpj = document.getElementById('bloco-cnpj');
  const campoNome = document.getElementById('label-nome-doc');
  if (campoCpf)  campoCpf.style.display  = tipo==='pf'  ? '' : 'none';
  if (campoCnpj) campoCnpj.style.display = tipo==='pj'  ? '' : 'none';
  if (campoNome) campoNome.textContent = tipo==='pj' ? 'Razão Social' : 'Nome Completo';
  atualizarDocContratoSocial();
}

function atualizarDocContratoSocial() {
  if (!operacaoSelecionada) return;
  const jaTem = operacaoSelecionada.documentos.find(d => d.key === 'contrato_social');
  if (tipoPessoa === 'pj' && !jaTem) {
    operacaoSelecionada.documentos.push({
      key: 'contrato_social',
      label: 'Contrato Social',
      sub: 'Documento da empresa (obrigatório para PJ)',
      obrigatorio: true,
      iconKey: 'docs'
    });
  } else if (tipoPessoa === 'pf' && jaTem) {
    operacaoSelecionada.documentos = operacaoSelecionada.documentos.filter(d => d.key !== 'contrato_social');
    delete arquivosPendentes['contrato_social'];
  }
  renderSlotsAnexo(operacaoSelecionada.documentos);
}

function toggleBlocoConjuge() {
  const sel = document.getElementById('f-estado_civil');
  const bloco = document.getElementById('bloco-conjuge');

  const estado = sel.value;
  const exibir = estado === 'casado' || estado === 'uniao_estavel';
  bloco.style.display = exibir ? 'block' : 'none';
  const nomeEl = document.getElementById('f-conjuge-nome');
  const cpfEl  = document.getElementById('f-conjuge-cpf');
  if (nomeEl) nomeEl.required = exibir;

function mascaraValor(el) {
  let v = el.value.replace(/\D/g, '');
  v = (parseInt(v, 10) || 0).toString();
  const reais = v.slice(0, -2).replace(/\B(?=(\d{3})+(?!\d))/g, '.') || '0';
  const centavos = v.slice(-2).padStart(2, '0');
  el.value = `R$ ${reais},${centavos}`;
}

function toggleCamposBem() {
  const select = document.getElementById('f-condicao-bem');
  const divNovo = document.getElementById('campos-bem-novo');
  if (!select || !divNovo) return;
  divNovo.style.display = (select.value === 'novo') ? 'block' : 'none';
  atualizarSlotCRLV();
}

function voltarEtapaAnterior(){
  if (bancoSelecionado && bancoSelecionado.subOperacoes.length > 1) renderTelaSubOperacao(bancoSelecionado);
  else renderTelaSelecaoBanco();
}

function atualizarSlotCRLV() {
  if (!operacaoSelecionada || !bancoSelecionado) return;
  if ((bancoSelecionado.id === 'porto' || bancoSelecionado.id === 'itau') && operacaoSelecionada.id === 'faturamento') {
    renderSlotsAnexo(operacaoSelecionada.documentos);
  }
}

function renderSlotsAnexo(documentos){
  const slots = document.getElementById('doc-slots');
  if (!slots) return;

  let crlvObrigatorio = false;
  if (bancoSelecionado && operacaoSelecionada && operacaoSelecionada.id === 'faturamento') {
    const selectCondicao = document.getElementById('f-condicao-bem');
    if (selectCondicao && selectCondicao.value === 'usado') {
      crlvObrigatorio = true;
    }
  }

  slots.innerHTML = documentos.map(cat => {
    const arq = arquivosPendentes[cat.key];
    const isCRLV = cat.key === 'crlv' || cat.key === 'Doc.CRLV';
    const obrigatorioAgora = cat.obrigatorio || (isCRLV && crlvObrigatorio);

    return `
      <div class="doc-slot ${arq?'preenchido':''} ${!obrigatorioAgora?'opcional':''}" data-cat="${cat.key}">
        <div class="doc-slot-head">
          <div class="doc-slot-icon">${ico(cat.iconKey,'ico ico-lg')}</div>
          <div style="flex:1">
            <div class="doc-slot-title">
              ${esc(cat.label)}
              ${obrigatorioAgora
                ? '<span class="tag tag-red" style="font-size:9.5px">Obrigatório</span>'
                : '<span class="tag tag-gray" style="font-size:9.5px">Opcional</span>'}
            </div>
            <div class="doc-slot-sub">${esc(cat.sub)}</div>
          </div>
          <div class="doc-slot-action">
            <input type="file" id="f-${cat.key}" accept=".pdf,.jpg,.jpeg,.png" onchange="setArquivoSlot('${cat.key}', this)">
            <button class="btn btn-outline btn-sm" type="button" onclick="document.getElementById('f-${cat.key}').click()">${arq?'Trocar':'Selecionar'}</button>
          </div>
        </div>
        ${arq?`<div class="doc-slot-arquivo">${ico('doc')} <span class="nome">${esc(arq.name)}</span> <span style="color:var(--text3);font-size:11px">${(arq.size/1024).toFixed(0)} KB</span> <button class="remover" onclick="removerArquivoSlot('${cat.key}')" title="Remover">✕</button></div>`:''}
      </div>`;
  }).join('');

  documentos.forEach(cat => {
    const el = document.querySelector(`.doc-slot[data-cat="${cat.key}"]`);
    if (!el) return;
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dragover'); });
    el.addEventListener('dragleave', () => el.classList.remove('dragover'));
    el.addEventListener('drop', e => {
      e.preventDefault(); el.classList.remove('dragover');
      if (e.dataTransfer.files.length){
        const inp = document.getElementById(`f-${cat.key}`);
        if (inp){ inp.files = e.dataTransfer.files; setArquivoSlot(cat.key, inp); }
      }
    });
  });
}

function setArquivoSlot(catKey, input){
  const f = input.files && input.files[0];
  if (!f) return;
  if (f.size > 16*1024*1024){ alerta('alerta-cadastro', `"${f.name}" passa de 16MB.`, 'erro'); return; }
  arquivosPendentes[catKey] = f;
  if (operacaoSelecionada) renderSlotsAnexo(operacaoSelecionada.documentos);
}

function removerArquivoSlot(catKey){
  delete arquivosPendentes[catKey];
  if (operacaoSelecionada) renderSlotsAnexo(operacaoSelecionada.documentos);
}

    cessionario = { nome: cesNome, cpf: cesCpf, grupo: cesGrupo, cota: cesCota, email: document.getElementById('f-cessionario-email')?.value?.trim()||null, telefone: document.getElementById('f-cessionario-telefone')?.value?.trim()||null, endereco: document.getElementById('f-cessionario-endereco')?.value?.trim()||null, estado_civil: estadoCivil, conjuge: { nome: conjugeNome, cpf: conjugeCpf } };

  }
  else if (bancoSelecionado.id === 'bradesco') {
    nome = document.getElementById('f-nome')?.value?.trim();

      ? (document.getElementById('f-cnpj')?.value||'').replace(/\D/g,'')

  }

  const docsObrigatorios = operacaoSelecionada.documentos.filter(d => d.obrigatorio);
  for (const cat of docsObrigatorios){
    if (!arquivosPendentes[cat.key]) return alerta('alerta-cadastro', `Anexo obrigatório: ${cat.label}.`, 'erro');
  }

  const tokenGerado = gerarTokenSeguro();
  const btn = document.getElementById('btn-enviar');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Enviando...';

  try{
    const { data: criado, error: errC } = await sb.rpc('cliente_criar_processo', {
      p_nome: nome,
      p_cpf: cpf,
      p_email: email,
      p_telefone: tel,
      p_grupo: grupo,
      p_cota: cota,
      p_corretor: corretor,
      p_descricao: JSON.stringify(dadosExtras || {}),
      p_dados_extras: dadosExtras,
      p_token: tokenGerado
    });
    if (errC) throw new Error(errC.message);
    const novoT = criado?.token || tokenGerado;

    for (const cat of operacaoSelecionada.documentos){
      const f = arquivosPendentes[cat.key];
      if (!f) continue;
      const path = `${novoT}/${cat.key}_${Date.now()}_${f.name}`;
      const { error: errUp } = await sb.storage.from('arquivos').upload(path, f);
      if (errUp){ console.warn('Upload falhou:', cat.key, errUp.message); continue; }
      await sb.rpc('cliente_registrar_arquivo', {
        p_token: novoT,
        p_nome_original: f.name,
        p_storage_path: path,
        p_categoria: cat.key
      });
    }

    arquivosPendentes = {};
    clienteNotificar(novoT, 'Novo processo recebido', nome);
    renderTelaSucesso(novoT, cpf);
  } catch(e){
    alerta('alerta-cadastro', 'Erro ao enviar: '+e.message, 'erro');
    btn.disabled=false; btn.innerHTML='Enviar processo '+ico('arrow');
  }
}

function copiarLink(link) {
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(link).then(() => mostrarNotif('Link copiado!'));
  } else {
    const el = document.createElement('textarea');
    el.value = link; document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el);
    mostrarNotif('Link copiado!');
  }
}

function formatarCpfCnpj(valor) {
  if (!valor) return '-';
  const num = valor.replace(/\D/g, '');
  if (num.length === 11) return num.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
  if (num.length === 14) return num.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
  return valor;
}

// Enviar documentos complementares
async function enviarNovosDocumentos() {
  const input = document.getElementById('novos-docs-input');
  const files = input.files;

    alerta('alerta-upload-doc', 'Selecione pelo menos um arquivo.', 'erro');
    return;

  const descricao = document.getElementById('nova-doc-desc')?.value.trim() || 'Documento complementar';
  const btn = document.getElementById('btn-upload-docs');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Enviando...';

    const { data: proc, error: procErr } = await sb
      .from('portal_processos')
      .select('id')
      .eq('token', processoAtual.token)
      .single();
    if (procErr || !proc) throw new Error('Processo não encontrado: ' + procErr?.message);

    const processoId = proc.id;
    let successCount = 0;
    const errors = [];

    for (const file of files) {
      if (file.size > 16 * 1024 * 1024) {
        mostrarNotif(`Arquivo ${file.name} excede 16MB, ignorado.`, 'erro');
        continue;
      }
      const timestamp = Date.now();
      const safeName = file.name.replace(/[^a-zA-Z0-9.\-]/g, '_');
      const path = `${processoAtual.token}/complementar_${timestamp}_${safeName}`;
      
      const { error: uploadErr } = await sb.storage.from('arquivos').upload(path, file);
      if (uploadErr) {
        errors.push(`${file.name}: ${uploadErr.message}`);
        continue;
      }
      
      const { error: insertErr } = await sb.from('portal_arquivos').insert({
        processo_id: processoId,
        nome_original: file.name,
        storage_path: path,
        categoria: 'complementar',
        descricao: descricao || null
      });
      if (insertErr) {
        errors.push(`${file.name}: erro no banco - ${insertErr.message}`);
        await sb.storage.from('arquivos').remove([path]);
        continue;
      }
      successCount++;
    }

if (successCount > 0) {
  // Pop-up simples e discreto (substitui o alerta grande)
  mostrarNotif(`${successCount} arquivo(s) enviado(s) com sucesso!`, 'ok');
  
  input.value = '';
  const descInput = document.getElementById('nova-doc-desc');
  if (descInput) descInput.value = '';
  
  await carregarDocumentos();
  clienteNotificar(processoAtual.token, 'Novo documento enviado pelo cliente', processoAtual.nome);
} else {
      const msg = errors.length ? `Erros: ${errors.join('; ')}` : 'Nenhum arquivo enviado.';
      alerta('alerta-upload-doc', msg, 'erro');
    }
  } catch (e) {
    console.error(e);
    alerta('alerta-upload-doc', 'Erro ao enviar: ' + e.message, 'erro');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `${ico('upload')} Enviar arquivo(s)`;
  }
}

async function carregarDocumentos(){
  const container = document.getElementById('lista-arquivos');
  if (!container) return;

  let data, error;
  try {
    const rpcRes = await sb.rpc('cliente_listar_arquivos', { p_token: processoAtual.token });
    data = rpcRes.data; error = rpcRes.error;
    if (error) {
      const { data: proc } = await sb.from('portal_processos').select('id').eq('token', processoAtual.token).single();
      if (proc) {
        const fb = await sb.from('portal_arquivos').select('*').eq('processo_id', proc.id).order('criado_em');
        data = fb.data; error = fb.error;
      }
    }
  } catch(e) {
    error = e;
  }

  if (error) {
    container.innerHTML = `<div class="empty"><div class="empty-msg" style="color:var(--red)">Erro ao carregar documentos: ${error.message}</div></div>`;
    return;
  }
  if (!data?.length){
    container.innerHTML = '<div class="empty"><div class="empty-icon">'+ico('doc')+'</div><div class="empty-msg">Nenhum documento</div></div>';
    atualizarCountDocs(0);
    return;
  }
  container.innerHTML = data.map(arq => {
    const url = sb.storage.from('arquivos').getPublicUrl(arq.storage_path).data.publicUrl;
    let categoriaExibicao = arq.categoria || '';
    if (categoriaExibicao === 'complementar') {
      categoriaExibicao = arq.descricao || 'Complementar';
    }
    return `
    <div class="arquivo-item" onclick="window.open('${url}','_blank')" style="cursor:pointer">
      <div class="file-ico">${ico('doc')}</div>
      <div class="file-info">
        <div class="file-name">${esc(arq.nome_original)}</div>
        <div class="file-meta">${esc(categoriaExibicao)} · ${fmtData(arq.criado_em)}</div>
      </div>
      <span style="font-size:10px;color:var(--mp-teal);font-weight:600">Abrir →</span>
    </div>`;
  }).join('');
  atualizarCountDocs(data.length);
}

async function carregarMensagens(){
  const timeline = document.getElementById('chat-messages');
  if (!timeline) return;

  let data, error;
  try {
    const rpcRes = await sb.rpc('cliente_listar_mensagens', { p_token: processoAtual.token });
    data = rpcRes.data; error = rpcRes.error;
    if (error) {
      const { data: proc } = await sb.from('portal_processos').select('id').eq('token', processoAtual.token).single();
      if (proc) {
        const fb = await sb.from('portal_mensagens').select('*').eq('processo_id', proc.id).order('criado_em');
        data = fb.data; error = fb.error;
      }
    }
  } catch(e) {
    error = e;
  }

  if (error) {
    timeline.innerHTML = '<div class="empty">Erro ao carregar mensagens.</div>';
    return;
  }
  if (!data?.length){
    timeline.innerHTML = '<div class="empty">Nenhuma mensagem ainda. Envie sua primeira mensagem!</div>';
    return;
  }
  timeline.innerHTML = data.map(m => {
    const lado = (m.autor === 'admin') ? 'admin' : 'cliente';
    return `
    <div class="msg-item ${lado}">
      <div class="msg-avatar">${lado === 'cliente' ? 'C' : 'A'}</div>
      <div>
        <div class="msg-balao">${esc(m.texto)}</div>
        <div class="msg-hora">${fmtData(m.criado_em)}</div>
      </div>
    </div>`;
  }).join('');
  timeline.scrollTop = timeline.scrollHeight;
}

async function carregarHistorico(){
  const hist = document.getElementById('historico');
  if (!hist) return;

  let data, error;
  try {
    const rpcRes = await sb.rpc('cliente_listar_historico_status', { p_token: processoAtual.token });
    data = rpcRes.data; error = rpcRes.error;
    if (error) {
      const { data: proc } = await sb.from('portal_processos').select('id').eq('token', processoAtual.token).single();
      if (proc) {
        const fb = await sb.from('portal_historico').select('*').eq('processo_id', proc.id).order('criado_em', { ascending: false });
        data = fb.data; error = fb.error;
      }
    }
  } catch(e) {
    error = e;
  }

  if (error) {
    hist.innerHTML = '<div class="empty">Erro ao carregar histórico.</div>';
    return;
  }
  if (!data?.length){
    hist.innerHTML = '<div class="empty">Sem histórico ainda.</div>';
    return;
  }
  hist.innerHTML = data.map(h => `
    <div class="hist-item">
      <div class="hist-dot">${ico('clock')}</div>
      <div class="hist-content">
        <div class="hist-status"><span class="tag ${tagClass(h.status_novo||h.status)}">${esc(h.status_novo||h.status||'-')}</span></div>
        ${h.observacao?`<div class="hist-obs">${esc(h.observacao)}</div>`:''}
        <div class="hist-hora">${fmtData(h.criado_em)}</div>
      </div>
    </div>
  `).join('');
}

async function enviarMensagem(){
  const textarea = document.getElementById('nova-msg');
  const txt = textarea?.value.trim();
  if (!txt || !processoAtual) return;

  const btn = document.getElementById('btn-enviar-msg');
  if (btn){ btn.disabled=true; btn.innerHTML='<span class="spinner"></span>'; }
  textarea.disabled = true;

  let error = null;
  try {
    const rpcRes = await sb.rpc('cliente_enviar_mensagem', {
      p_token: processoAtual.token,
      p_texto: txt,
      p_autor: 'cliente'
    });
    error = rpcRes.error;
    if (error) {
      const { data: proc, error: ep } = await sb.from('portal_processos').select('id').eq('token', processoAtual.token).single();
      if (!ep && proc) {
        const ins = await sb.from('portal_mensagens').insert({ processo_id: proc.id, autor: 'cliente', texto: txt });
        error = ins.error;
      }
    }
  } catch(e) {
    error = e;
  }

  if (btn){ btn.disabled=false; btn.innerHTML=ico('send'); }
  textarea.disabled = false;

  if (error) { mostrarNotif('Erro ao enviar mensagem.', 'erro'); return; }

  textarea.value = '';
  textarea.focus();
  clienteNotificar(processoAtual && processoAtual.token, 'Nova mensagem do cliente', (processoAtual && processoAtual.nome) || '');
  await carregarMensagens();
}

function iniciarPolling(){
  if (_pollingInterval) clearInterval(_pollingInterval);
  _pollingInterval = setInterval(async () => {
    if (!processoAtual) return;
    const { data } = await sb.rpc('cliente_obter_por_token', { p_token: processoAtual.token });
    if (data && data.status !== processoAtual.status){
      processoAtual = data;
      renderPortalProcesso();
    } else {
      await carregarMensagens();
      await carregarHistorico();
    }
  }, 30000);
}

function abrirTab(id){
  document.querySelectorAll('.painel').forEach(p => p.classList.remove('ativo'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('ativa'));
  const painel = document.getElementById(id);
  if (painel) painel.classList.add('ativo');
  const tabMap = { 'painel-docs':'tab-docs', 'painel-msg':'tab-msg', 'painel-hist':'tab-hist' };
  const tabEl = document.getElementById(tabMap[id]);
  if (tabEl) tabEl.classList.add('ativa');
}

function atualizarCountDocs(n){
  const el = document.getElementById('count-docs');
  if (el) el.textContent = n;
}

// ════════════════ UTILITÁRIOS ════════════════
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function v(id){ return document.getElementById(id)?.value; }
function fmtData(d){
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function tagClass(s){
  const map = {
    'Recebido':'tag-blue','Em análise':'tag-amber','Enviado para administradora':'tag-teal',
    'Em retorno da administradora':'tag-purple','Finalizado':'tag-green','Cancelado':'tag-red'
  };
  return map[s] || 'tag-gray';
}

function mascaraCPF(el){
  let v = el.value.replace(/\D/g,'');
  v = v.substring(0,11);
  v = v.replace(/^(\d{3})(\d)/, '$1.$2');
  v = v.replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3');
  v = v.replace(/\.(\d{3})(\d)/, '.$1-$2');
  el.value = v;
}

function mascaraCNPJ(el){
  let v = el.value.replace(/\D/g,'');
  v = v.substring(0,14);
  v = v.replace(/^(\d{2})(\d)/, '$1.$2');
  v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
  v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
  v = v.replace(/(\d{4})(\d)/, '$1-$2');
  el.value = v;
}

function mascaraCpfCnpj(el){
  let raw = el.value.replace(/\D/g,'');
  if (raw.length <= 11) {
    raw = raw.substring(0,11);
    raw = raw.replace(/^(\d{3})(\d)/, '$1.$2');
    raw = raw.replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3');
    raw = raw.replace(/\.(\d{3})(\d)/, '.$1-$2');
  } else {
    raw = raw.substring(0,14);
    raw = raw.replace(/^(\d{2})(\d)/, '$1.$2');
    raw = raw.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
    raw = raw.replace(/\.(\d{3})(\d)/, '.$1/$2');
    raw = raw.replace(/(\d{4})(\d)/, '$1-$2');
  }
  el.value = raw;
}

function mascaraCpfCnpjGenerico(el){ mascaraCpfCnpj(el); }

function mascaraTel(el){
  let v = el.value.replace(/\D/g,'');
  v = v.substring(0,11);
  if (v.length>2) v = `(${v.substring(0,2)}) ${v.substring(2)}`;
  if (v.length>10) v = v.substring(0,10)+'-'+v.substring(10);
  el.value = v;
}

function alerta(id, msg, tipo){
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `alerta alerta-${tipo} visivel`;
  const iconHtml = SVG[tipo==='erro'?'alert':(tipo==='sucesso'?'check':'alert')] || SVG.alert;
  el.innerHTML = `${iconHtml} ${msg}`;
  setTimeout(() => el.classList.remove('visivel'), 6000);
}
