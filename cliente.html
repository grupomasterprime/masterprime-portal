<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Prime — Portal do Cliente</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ══════════════════════════════════
       MASTER PRIME — DESIGN SYSTEM (inline, sem dependência externa)
       ══════════════════════════════════ */
    :root{
      --mp-navy:#2D3F5E; --mp-navy-2:#1E2D45; --mp-teal:#4DBCC8; --mp-teal-2:#3AA7B3;
      --mp-yellow:#F4C24A; --mp-amber:#E89D3A;
      --bg:#F6F8FB; --card:#FFFFFF; --border:#E6EAF1; --border2:#D7DEE8;
      --text:#1A2030; --text2:#5A6478; --text3:#8C95A7;
      --green:#16A34A; --green-bg:#DCFCE7; --red:#DC2626; --red-bg:#FEE2E2;
      --blue:#2563EB; --blue-bg:#DBEAFE; --amber:#D97706; --amber-bg:#FEF3C7;
      --purple:#7C3AED; --purple-bg:#EDE9FE;
      --r:14px; --r-sm:8px;
      --shadow:0 1px 2px rgba(15,23,42,.04), 0 4px 12px rgba(15,23,42,.04);
      --shadow-lg:0 8px 24px rgba(15,23,42,.10);
      --fonte:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      --fonte-mono:'DM Mono',ui-monospace,Menlo,Consolas,monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:var(--fonte);
      color:var(--text); font-size:13px; line-height:1.5;
      background:
        radial-gradient(ellipse at top left, rgba(77,188,200,.10), transparent 55%),
        radial-gradient(ellipse at top right, rgba(244,194,74,.08), transparent 50%),
        linear-gradient(180deg, #FAFCFE 0%, #F4F7FB 100%);
      min-height:100vh; -webkit-font-smoothing:antialiased;
    }
    a{color:var(--mp-teal-2);text-decoration:none}
    a:hover{text-decoration:underline}

    /* ─── Header ─── */
    .header{
      background:linear-gradient(135deg, var(--mp-navy) 0%, var(--mp-navy-2) 100%);
      padding:0 28px; height:62px;
      display:flex; align-items:center; justify-content:space-between;
      box-shadow:0 2px 14px rgba(45,63,94,.18);
      position:sticky; top:0; z-index:20;
    }
    .header-logo{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.4px;display:flex;align-items:center;gap:10px}
    .header-logo .logo-mark{
      width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.12);
      display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:13px;color:var(--mp-yellow);
      border:1px solid rgba(255,255,255,.16);
    }
    .header-logo span{color:var(--mp-teal)}
    .header-right{display:flex;align-items:center;gap:14px}
    .header-tag{
      font-size:10px;font-weight:700;
      color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:1.6px;
    }

    /* ─── Container ─── */
    .container{max-width:960px;margin:0 auto;padding:36px 22px 80px}

    /* ─── Hero do cliente (logado) ─── */
    .cliente-hero{
      display:grid; grid-template-columns:1.1fr .9fr; gap:24px;
      align-items:center; margin-bottom:22px;
      padding:30px 32px; border-radius:18px;
      background:linear-gradient(135deg, var(--mp-navy) 0%, #344A6E 100%);
      color:#fff;
      box-shadow:0 18px 44px rgba(45,63,94,.24);
      position:relative; overflow:hidden;
    }
    .cliente-hero::before{
      content:""; position:absolute; right:-60px; top:-60px;
      width:240px; height:240px; border-radius:50%;
      background:radial-gradient(circle, rgba(77,188,200,.20), transparent 60%);
    }
    .cliente-hero h1{font-size:24px;font-weight:800;margin-bottom:8px;letter-spacing:-.3px;line-height:1.2}
    .cliente-hero p{font-size:13px;color:rgba(255,255,255,.78);line-height:1.55;max-width:520px}
    .cliente-hero-panel{
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(8px);
      border-radius:12px; padding:18px;
      font-size:12px; color:rgba(255,255,255,.86);
      position:relative; z-index:1;
    }
    .cliente-hero-panel strong{display:block;color:#fff;margin-bottom:6px;font-size:13px}

    /* ─── Cards ─── */
    .card{
      background:var(--card); border-radius:var(--r);
      box-shadow:var(--shadow); border:1px solid var(--border);
      margin-bottom:18px; overflow:hidden;
    }
    .card-head{
      padding:18px 22px 14px; border-bottom:1px solid var(--border);
      display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
    }
    .card-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.1px;display:flex;align-items:center;gap:8px}
    .card-sub{font-size:11.5px;color:var(--text2);margin-top:3px;line-height:1.45}
    .card-body{padding:20px 22px}

    /* Ícones SVG inline */
    .ico{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:currentColor}
    .ico svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    .ico-lg{width:24px;height:24px}
    .ico-xl{width:34px;height:34px}

    /* ─── Botões ─── */
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:11px 18px; border-radius:10px;
      font-family:inherit; font-size:12.5px; font-weight:600;
      cursor:pointer; border:none; transition:all .15s;
      text-decoration:none; line-height:1; white-space:nowrap;
    }
    .btn-primary{background:var(--mp-navy);color:#fff;box-shadow:0 2px 8px rgba(45,63,94,.18)}
    .btn-primary:hover{background:var(--mp-navy-2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(45,63,94,.22)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .btn-outline{background:#fff;color:var(--mp-navy);border:1.5px solid var(--border2)}
    .btn-outline:hover{border-color:var(--mp-navy);background:#F8FAFC}
    .btn-teal{background:var(--mp-teal);color:#fff;box-shadow:0 2px 8px rgba(77,188,200,.20)}
    .btn-teal:hover{background:var(--mp-teal-2)}
    .btn-sm{padding:8px 14px;font-size:11.5px;border-radius:8px}
    .btn-xs{padding:6px 11px;font-size:11px;border-radius:6px}
    .w-100{width:100%}

    /* ─── Inputs ─── */
    .campo{margin-bottom:14px}
    .campo label{
      display:block;font-size:11px;font-weight:600;color:var(--text2);
      text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;
    }
    .campo .req{color:var(--red)}
    .campo input,.campo textarea,.campo select{
      width:100%; padding:10px 13px;
      border:1.5px solid var(--border2); border-radius:8px;
      font-family:inherit; font-size:13px; color:var(--text);
      background:#fff; outline:none;
      transition:border-color .15s, box-shadow .15s;
    }
    .campo input:focus,.campo textarea:focus,.campo select:focus{
      border-color:var(--mp-teal); box-shadow:0 0 0 3px rgba(77,188,200,.14);
    }
    .campo input:disabled{background:#F8FAFC;color:var(--text3);cursor:not-allowed}
    .campo textarea{resize:vertical;min-height:64px;font-family:inherit}
    .campo .hint{font-size:11px;color:var(--text3);margin-top:4px}

    /* ─── Alertas ─── */
    .alerta{
      display:none; padding:11px 14px; border-radius:8px;
      font-size:12px; margin-bottom:14px;
      border:1px solid transparent; line-height:1.5;
    }
    .alerta.visivel{display:flex;align-items:flex-start;gap:8px}
    .alerta-erro{background:var(--red-bg);color:#991B1B;border-color:#FCA5A5}
    .alerta-aviso{background:var(--amber-bg);color:#92400E;border-color:#FCD34D}
    .alerta-sucesso{background:var(--green-bg);color:#166534;border-color:#86EFAC}
    .alerta-info{background:var(--blue-bg);color:#1E40AF;border-color:#93C5FD}

    /* ─── Tags ─── */
    .tag{
      display:inline-flex;align-items:center;gap:5px;
      padding:3px 9px; font-size:10.5px; font-weight:700;
      border-radius:999px; line-height:1.3;
      background:#F1F5F9;color:var(--text2);
    }
    .tag-blue{background:var(--blue-bg);color:#1E40AF}
    .tag-amber{background:var(--amber-bg);color:#92400E}
    .tag-purple{background:var(--purple-bg);color:#5B21B6}
    .tag-teal{background:#CFFAFE;color:#0E7490}
    .tag-green{background:var(--green-bg);color:#166534}
    .tag-red{background:var(--red-bg);color:#991B1B}
    .tag-gray{background:#F1F5F9;color:var(--text2)}

    /* ─── Tela inicial (consulta CPF / iniciar) ─── */
    .start-wrap{
      max-width:520px;margin:30px auto 0;
    }
    .start-card{
      background:var(--card); border-radius:18px;
      box-shadow:var(--shadow-lg); border:1px solid var(--border);
      overflow:hidden;
    }
    .start-head{
      padding:34px 30px 26px; text-align:center;
      background:linear-gradient(180deg, #FAFCFE 0%, #FFFFFF 100%);
      border-bottom:1px solid var(--border);
    }
    .start-head .badge-icon{
      width:56px;height:56px;border-radius:14px;margin:0 auto 14px;
      background:linear-gradient(135deg, var(--mp-teal) 0%, var(--mp-teal-2) 100%);
      display:flex;align-items:center;justify-content:center;color:#fff;
      box-shadow:0 6px 16px rgba(77,188,200,.30);
    }
    .start-head h1{font-size:20px;font-weight:800;color:var(--mp-navy);margin-bottom:6px;letter-spacing:-.2px}
    .start-head p{font-size:12.5px;color:var(--text2)}
    .start-body{padding:24px 30px 28px}
    .start-divider{
      display:flex;align-items:center;gap:14px;
      margin:22px 0 16px;color:var(--text3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;
    }
    .start-divider::before,.start-divider::after{content:"";flex:1;height:1px;background:var(--border)}

    /* ─── Lista de processos múltiplos ─── */
    .proc-card-list{display:flex;flex-direction:column;gap:0}
    .proc-row{
      display:flex; align-items:center; gap:14px;
      padding:14px 18px; border-radius:10px;
      border:1px solid var(--border); background:#fff;
      cursor:pointer; transition:all .15s;
      text-decoration:none; color:inherit;
    }
    .proc-row+.proc-row{margin-top:8px}
    .proc-row:hover{border-color:var(--mp-teal);background:#F8FCFD;transform:translateX(2px)}
    .proc-info{flex:1;min-width:0}
    .proc-name{font-weight:700;font-size:13px;color:var(--text);margin-bottom:2px}
    .proc-meta{font-size:11px;color:var(--text2);display:flex;flex-wrap:wrap;gap:6px}
    .proc-meta .mono{font-family:var(--fonte-mono);font-weight:700;color:var(--text)}
    .proc-arrow{color:var(--text3);font-weight:700;font-size:14px}

    /* ─── Bloco do protocolo ─── */
    .protocolo-bar{
      background:#fff; border:1px solid var(--border);
      border-radius:14px; padding:18px 22px;
      display:grid; grid-template-columns:1.1fr 1fr 1fr; gap:22px; align-items:center;
      margin-bottom:18px; box-shadow:var(--shadow);
    }
    .protocolo-num{
      font-family:var(--fonte-mono); font-size:18px; font-weight:700;
      color:var(--mp-navy); letter-spacing:.6px; line-height:1.1;
    }
    .protocolo-pendente{font-size:12px;color:var(--amber);font-weight:600;display:flex;align-items:center;gap:6px}
    .protocolo-label{
      font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.7px;
      color:var(--text3); margin-bottom:4px;
    }
    .protocolo-actions{display:flex;flex-direction:column;align-items:flex-end;gap:5px}

    /* ─── Stepper ─── */
    .stepper{
      background:#fff; border:1px solid var(--border); border-radius:14px;
      padding:24px 26px; margin-bottom:18px;
      display:flex; gap:0; box-shadow:var(--shadow);
      overflow-x:auto;
    }
    .step{
      display:flex; flex-direction:column; align-items:center;
      flex:1; min-width:90px; position:relative;
    }
    .step:not(:last-child)::after{
      content:""; position:absolute; top:16px; left:calc(50% + 18px); right:calc(-50% + 18px);
      height:2px; background:var(--border); z-index:0;
    }
    .step.concluido:not(:last-child)::after{background:var(--mp-teal)}
    .step-dot{
      width:36px;height:36px;border-radius:50%;
      border:2px solid var(--border); background:#fff;
      display:flex;align-items:center;justify-content:center;
      z-index:1; position:relative; transition:all .3s;
      color:var(--text3);
    }
    .step.concluido .step-dot{background:var(--mp-teal);border-color:var(--mp-teal);color:#fff}
    .step.atual .step-dot{
      background:var(--mp-navy); border-color:var(--mp-navy); color:#fff;
      box-shadow:0 0 0 5px rgba(45,63,94,.12);
    }
    .step-label{
      font-size:9.5px; font-weight:700; color:var(--text3);
      text-align:center; margin-top:8px; max-width:90px;
      line-height:1.3; text-transform:uppercase; letter-spacing:.4px;
    }
    .step.atual .step-label{color:var(--mp-navy)}
    .step.concluido .step-label{color:var(--mp-teal)}

    /* ─── Abas ─── */
    .tabs{
      display:flex; gap:2px; padding:4px;
      background:#F1F5F9; border-radius:12px;
      margin-bottom:20px;
    }
    .tab-btn{
      flex:1; padding:10px 14px;
      background:transparent; border:none;
      font-family:inherit; font-size:12px; font-weight:600;
      color:var(--text2); cursor:pointer;
      border-radius:9px; transition:all .15s;
      display:inline-flex; align-items:center; justify-content:center; gap:7px;
      white-space:nowrap;
    }
    .tab-btn:hover:not(.ativa){color:var(--text);background:rgba(255,255,255,.6)}
    .tab-btn.ativa{background:#fff;color:var(--mp-navy);box-shadow:0 2px 6px rgba(15,23,42,.06)}
    .tab-count{
      font-size:10px; padding:1px 6px; border-radius:999px;
      background:#E2E8F0; color:var(--text2); font-weight:700;
    }
    .tab-btn.ativa .tab-count{background:var(--mp-teal);color:#fff}
    .painel{display:none}
    .painel.ativo{display:block}

    /* ─── Form cadastro inicial ─── */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0 18px}

    /* ─── Upload categorizado (cliente novo) ─── */
    .doc-slots{display:flex;flex-direction:column;gap:14px}
    .doc-slot{
      border:1.5px dashed var(--border2); border-radius:12px;
      padding:18px; transition:all .2s; background:#fff;
    }
    .doc-slot.preenchido{border-style:solid;border-color:var(--green);background:#F7FEF9}
    .doc-slot.opcional{border-color:#E2E8F0;background:#FAFBFD}
    .doc-slot.dragover{border-color:var(--mp-teal);background:#F0FAFB;transform:scale(1.005)}
    .doc-slot-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .doc-slot-icon{
      width:40px;height:40px;border-radius:10px;flex-shrink:0;
      background:#F1F5F9;color:var(--text2);
      display:flex;align-items:center;justify-content:center;
    }
    .doc-slot.preenchido .doc-slot-icon{background:var(--green-bg);color:var(--green)}
    .doc-slot-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
    .doc-slot-sub{font-size:11px;color:var(--text2);margin-top:2px}
    .doc-slot-action{margin-left:auto;display:flex;gap:6px;align-items:center}
    .doc-slot input[type=file]{display:none}
    .doc-slot-arquivo{
      display:flex; align-items:center; gap:10px;
      padding:8px 12px; background:#F1F5F9; border-radius:8px;
      font-size:12px; margin-top:6px;
    }
    .doc-slot-arquivo .nome{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .doc-slot-arquivo .remover{
      background:none;border:none;color:var(--red);cursor:pointer;
      font-size:14px;padding:0 4px;
    }

    /* ─── Lista de arquivos enviados (na tab Documentos) ─── */
    .arquivo-item{
      display:flex; align-items:center; gap:10px;
      padding:10px 14px; border-radius:8px;
      border:1px solid var(--border);
      margin-bottom:8px; background:#fff; font-size:12.5px;
    }
    .arquivo-item:hover{border-color:var(--mp-teal);background:#F8FCFD}
    .arquivo-item .file-ico{
      width:34px;height:34px;border-radius:8px;flex-shrink:0;
      background:var(--blue-bg);color:var(--blue);
      display:flex;align-items:center;justify-content:center;
    }
    .arquivo-item .file-info{flex:1;min-width:0}
    .arquivo-item .file-name{font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .arquivo-item .file-meta{font-size:11px;color:var(--text2);margin-top:1px}

    /* ─── Mensagens / chat ─── */
    .timeline{
      max-height:420px; overflow-y:auto; padding:8px 6px 8px 0;
      display:flex; flex-direction:column; gap:14px;
    }
    .timeline::-webkit-scrollbar{width:6px}
    .timeline::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
    .msg-item{display:flex;gap:10px;align-items:flex-start;max-width:85%}
    .msg-item.cliente{align-self:flex-end;flex-direction:row-reverse}
    .msg-avatar{
      width:32px;height:32px;border-radius:50%;
      flex-shrink:0; display:flex; align-items:center; justify-content:center;
      font-size:13px;font-weight:700; color:#fff;
      background:var(--mp-teal);
    }
    .msg-item.admin .msg-avatar{background:var(--mp-navy)}
    .msg-balao{
      padding:10px 14px; border-radius:14px;
      font-size:13px; line-height:1.5;
      background:var(--mp-teal);color:#fff;
      border-top-right-radius:4px;
    }
    .msg-item.admin .msg-balao{background:#F1F5F9;color:var(--text);border-top-right-radius:14px;border-top-left-radius:4px}
    .msg-hora{
      font-size:10.5px;color:var(--text3);
      margin-top:4px; padding:0 4px;
    }
    .msg-input-wrap{
      display:flex; gap:10px;
      margin-top:18px; padding-top:18px;
      border-top:1px solid var(--border);
    }
    .msg-input-wrap textarea{
      flex:1;padding:11px 14px;
      border:1.5px solid var(--border2); border-radius:10px;
      font-family:inherit;font-size:13px; resize:none;
      min-height:46px; max-height:120px; outline:none;
      transition:border-color .15s;
    }
    .msg-input-wrap textarea:focus{border-color:var(--mp-teal)}

    /* ─── Histórico ─── */
    .hist-item{
      display:flex; gap:14px; padding:12px 0;
      border-bottom:1px solid var(--border);
    }
    .hist-item:last-child{border-bottom:none}
    .hist-dot{
      width:34px;height:34px;border-radius:50%;flex-shrink:0;
      background:var(--blue-bg);color:var(--blue);
      display:flex;align-items:center;justify-content:center;
    }
    .hist-content{flex:1}
    .hist-status{margin-bottom:4px}
    .hist-obs{font-size:12px;color:var(--text);margin-top:4px}
    .hist-hora{font-size:10.5px;color:var(--text3);margin-top:4px;font-family:var(--fonte-mono)}

    /* ─── Vazio ─── */
    .empty{padding:30px 20px;text-align:center;color:var(--text3)}
    .empty-icon{
      width:48px;height:48px;border-radius:50%;
      background:#F1F5F9; margin:0 auto 12px;
      display:flex;align-items:center;justify-content:center;color:var(--text3);
    }
    .empty-msg{font-size:12.5px}

    /* ─── Spinner ─── */
    .spinner{
      width:14px;height:14px;border:2px solid #E2E8F0;
      border-top-color:var(--mp-teal); border-radius:50%;
      display:inline-block; animation:spin .8s linear infinite;
    }
    .spinner-dark{border-color:#E2E8F0;border-top-color:var(--mp-navy)}
    .spinner-lg{width:32px;height:32px;border-width:3px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ─── Notificação ─── */
    .notif{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:var(--mp-navy);color:#fff;
      padding:11px 22px;border-radius:999px;
      font-size:12.5px;font-weight:600;
      box-shadow:0 6px 18px rgba(0,0,0,.28);
      z-index:999; display:flex; align-items:center; gap:8px;
      animation:fadeUp .3s ease;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}}
    @keyframes fadeIn{from{opacity:0}}

    /* ─── Loading global ─── */
    #loading-page{
      min-height:calc(100vh - 62px);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:16px;
    }

    /* ─── Responsivo ─── */
    @media (max-width:680px){
      .container{padding:24px 14px 60px}
      .cliente-hero{grid-template-columns:1fr;padding:24px}
      .protocolo-bar{grid-template-columns:1fr;gap:14px}
      .protocolo-actions{align-items:flex-start}

const ico = (key, cls='ico') => `<span class="${cls}">${SVG[key]||''}</span>`;

// ════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════
// TELA 1 — CONSULTA POR CPF / INICIAR
// ════════════════════════════════════════════════════════════
function renderTelaConsulta(){

async function consultarProcesso(){
  const cpf = (document.getElementById('cpf-consulta').value||'').replace(/\D/g,'');
  if (cpf.length<11){ alerta('alerta-consulta','Informe um CPF válido com 11 dígitos.','erro'); return; }

  const btn = document.querySelector('button.btn.btn-primary.w-100');
  if (btn){ btn.disabled=true; btn.innerHTML = '<span class="spinner"></span> Buscando...'; }

  // RPC segura: cliente_listar_por_cpf
  const { data, error } = await sb.rpc('cliente_listar_por_cpf', { p_cpf: cpf });

  if (btn){ btn.disabled=false; btn.innerHTML = ico('search')+' Consultar processo'; }

  if (error){ alerta('alerta-consulta','Erro ao buscar. Tente novamente.','erro'); console.error(error); return; }
  if (!data || data.length===0){ alerta('alerta-consulta','Nenhum processo encontrado para este CPF.','erro'); return; }

  if (data.length===1){ window.location.href = `?token=${data[0].token}`; return; }

  const lista = document.getElementById('lista-processos-cpf');
  lista.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">Processos encontrados (${data.length})</div>
          <div class="card-sub">Selecione qual deseja acompanhar</div>
        </div>
      </div>
      <div class="card-body" style="padding:14px">
        <div class="proc-card-list">
          ${data.map(p => `
            <a class="proc-row" href="?token=${esc(p.token)}">
              <div class="proc-info">
                <div class="proc-name">${esc(p.nome)}</div>
                <div class="proc-meta">
                  ${p.protocolo
                    ? `<span class="mono">${esc(p.protocolo)}</span>`
                    : `<span style="color:var(--amber);font-weight:700">Protocolo pendente</span>`}
                  ${p.grupo ? `<span>· Grupo ${esc(p.grupo)}</span>` : ''}
                  ${p.cota  ? `<span>· Cota ${esc(p.cota)}</span>`  : ''}
                  <span>· ${fmtData(p.criado_em)}</span>
                </div>
              </div>
              <span class="tag ${tagClass(p.status)}">${esc(p.status)}</span>
              <span class="proc-arrow">→</span>
            </a>
          `).join('')}
        </div>
      </div>
    </div>`;
}

// TELA 2 — CADASTRO INICIAL
// ════════════════════════════════════════════════════════════
function renderTelaCadastro(){
  arquivosPendentes = {};
  root.innerHTML = `

              <input type="text" id="f-telefone" placeholder="(00) 00000-0000" maxlength="15"
                oninput="mascaraTel(this)"></div>

    </div>`;

  renderSlotsAnexo();
}

function renderSlotsAnexo(){
  const slots = document.getElementById('doc-slots');
  if (!slots) return;
  slots.innerHTML = CATEGORIAS_ANEXO.map(cat => {
    const arq = arquivosPendentes[cat.key];
    return `
      <div class="doc-slot ${arq?'preenchido':''} ${cat.obrigatorio?'':'opcional'}" data-cat="${cat.key}">
        <div class="doc-slot-head">
          <div class="doc-slot-icon">${ico(cat.iconKey,'ico ico-lg')}</div>
          <div style="flex:1">
            <div class="doc-slot-title">
              ${esc(cat.label)}
              ${cat.obrigatorio
                ? '<span class="tag tag-red" style="font-size:9.5px">Obrigatório</span>'
                : '<span class="tag tag-gray" style="font-size:9.5px">Opcional</span>'}
            </div>
            <div class="doc-slot-sub">${esc(cat.sub)}</div>
          </div>
          <div class="doc-slot-action">
            <input type="file" id="f-${cat.key}" accept=".pdf,.jpg,.jpeg,.png"
              onchange="setArquivoSlot('${cat.key}', this)">
            <button class="btn btn-outline btn-sm" type="button"
              onclick="document.getElementById('f-${cat.key}').click()">
              ${arq ? 'Trocar' : 'Selecionar'}
            </button>
          </div>
        </div>
        ${arq ? `
          <div class="doc-slot-arquivo">
            ${ico('doc')}
            <span class="nome">${esc(arq.name)}</span>
            <span style="color:var(--text3);font-size:11px">${(arq.size/1024).toFixed(0)} KB</span>
            <button class="remover" onclick="removerArquivoSlot('${cat.key}')" title="Remover">✕</button>
          </div>` : ''}
      </div>`;
  }).join('');

  // Drag and drop em cada slot
  CATEGORIAS_ANEXO.forEach(cat => {
    const el = document.querySelector(`.doc-slot[data-cat="${cat.key}"]`);
    if (!el) return;
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dragover'); });
    el.addEventListener('dragleave', () => el.classList.remove('dragover'));
    el.addEventListener('drop', e => {
      e.preventDefault(); el.classList.remove('dragover');
      const f = e.dataTransfer.files;
      if (f.length){
        const inp = document.getElementById(`f-${cat.key}`);
        if (inp){ inp.files = f; setArquivoSlot(cat.key, inp); }
      }
    });
  });
}

function setArquivoSlot(catKey, input){
  const f = input.files && input.files[0];
  if (!f) return;
  if (f.size > 16*1024*1024){ alerta('alerta-cadastro', `"${f.name}" passa de 16MB.`, 'erro'); return; }
  arquivosPendentes[catKey] = f;
  renderSlotsAnexo();
}
function removerArquivoSlot(catKey){
  delete arquivosPendentes[catKey];
  renderSlotsAnexo();
}

async function enviarCadastro(){
  const nome  = v('f-nome')?.trim();
  const cpf   = (v('f-cpf')||'').replace(/\D/g,'');
  const grupo = v('f-grupo')?.trim();
  const cota  = v('f-cota')?.trim();
  const email = v('f-email')?.trim()||null;
  const tel   = v('f-telefone')?.trim()||null;
  const corretor = v('f-corretor')?.trim()||null;
  const desc  = v('f-descricao')?.trim()||null;

  if (!nome)  return alerta('alerta-cadastro','Nome é obrigatório.','erro');
  if (cpf.length<11) return alerta('alerta-cadastro','CPF inválido.','erro');
  if (!grupo) return alerta('alerta-cadastro','Grupo é obrigatório.','erro');
  if (!cota)  return alerta('alerta-cadastro','Cota é obrigatória.','erro');

  // Validar anexos obrigatórios
  for (const cat of CATEGORIAS_ANEXO){
    if (cat.obrigatorio && !arquivosPendentes[cat.key]){
      return alerta('alerta-cadastro', `Anexo obrigatório: ${cat.label}.`, 'erro');
    }
  }

  const btn = document.getElementById('btn-enviar');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Enviando...';

  try{
    // 1) Criar processo via RPC
    const { data: criado, error: errC } = await sb.rpc('cliente_criar_processo', {
      p_nome:nome, p_cpf:cpf, p_email:email, p_telefone:tel,
      p_grupo:grupo, p_cota:cota, p_corretor:corretor, p_descricao:desc
    });
    if (errC) throw new Error(errC.message);
    const novoToken = criado?.token;
    if (!novoToken) throw new Error('Falha ao gerar token do processo.');

    // 2) Upload de anexos categorizados
    for (const cat of CATEGORIAS_ANEXO){
      const f = arquivosPendentes[cat.key];
      if (!f) continue;
      const path = `${novoToken}/${cat.key}_${Date.now()}_${f.name}`;
      const { error: errUp } = await sb.storage.from('arquivos').upload(path, f);
      if (errUp){ console.warn('Upload falhou:', cat.key, errUp.message); continue; }
      await sb.rpc('cliente_registrar_arquivo', {
        p_token: novoToken, p_nome_original:f.name,
        p_storage_path:path, p_categoria:cat.key
      });
    }

    arquivosPendentes = {};
    window.location.href = `?token=${novoToken}`;

  } catch(e){
    alerta('alerta-cadastro', 'Erro ao enviar: '+e.message, 'erro');
    btn.disabled=false; btn.innerHTML='Enviar processo '+ico('arrow');
  }
}

// ════════════════════════════════════════════════════════════
// TELA 3 — PORTAL DO PROCESSO (após token)
// ════════════════════════════════════════════════════════════
async function carregarProcesso(token){
  if (_pollingInterval) clearInterval(_pollingInterval);

  // RPC: traz processo + arquivos + mensagens + historico
  const { data, error } = await sb.rpc('cliente_buscar_por_token', { p_token: token });

  if (error || !data || !data.processo){
    root.innerHTML = `
      <div class="container">
        <div class="start-wrap" style="margin-top:60px">
          <div class="card" style="text-align:center;padding:48px 28px">
            <div style="width:64px;height:64px;border-radius:50%;background:var(--red-bg);color:var(--red);
                        display:flex;align-items:center;justify-content:center;margin:0 auto 18px">
              ${ico('alert','ico ico-xl')}
            </div>
            <h2 style="color:var(--mp-navy);font-size:18px;margin-bottom:8px">Processo não encontrado</h2>
            <p style="font-size:13px;color:var(--text2)">O link pode estar expirado ou incorreto.</p>
            <a href="?" class="btn btn-outline" style="margin-top:22px">${ico('back')} Consultar outro processo</a>
          </div>
        </div>
      </div>`;
    return;
  }

  const proc = data.processo;
  const arquivos  = data.arquivos  || [];
  const mensagens = data.mensagens || [];
  const historico = data.historico || [];
  processoAtual = proc;

  renderPortalProcesso(proc, arquivos, mensagens, historico);

  // Polling silencioso a cada 30s
  _pollingInterval = setInterval(() => verificarAtualizacoes(token), 30000);
}

async function verificarAtualizacoes(token){
  const { data } = await sb.rpc('cliente_buscar_por_token', { p_token: token });
  if (!data || !data.processo || !processoAtual) return;
  const proc = data.processo;
  const mudou = proc.atualizado_em !== processoAtual.atualizado_em
             || proc.status !== processoAtual.status
             || proc.protocolo !== processoAtual.protocolo;
  if (!mudou) return;
  processoAtual = proc;
  atualizarCabecalho(proc);
  atualizarStepper(proc);
  atualizarContadoresAbas(data.arquivos||[], data.mensagens||[], data.historico||[]);
  atualizarPainelDocumentos(data.arquivos||[]);
  atualizarPainelMensagens(data.mensagens||[]);
  atualizarPainelHistorico(data.historico||[]);
  mostrarNotif('Processo atualizado pela equipe');
}

function renderPortalProcesso(proc, arquivos, mensagens, historico){
  const idxAtual = ETAPAS.findIndex(e => e.status === proc.status);

  root.innerHTML = `
    <div class="container">
      <div id="alerta-portal" class="alerta"></div>

      <!-- Bloco protocolo -->
      <div class="protocolo-bar">
        <div>
          <div class="protocolo-label">Protocolo</div>
          ${proc.protocolo
            ? `<div class="protocolo-num">${esc(proc.protocolo)}</div>`
            : `<div class="protocolo-pendente">${ico('clock')} Aguardando atribuição da equipe</div>`}
        </div>
        <div>
          <div class="protocolo-label">Status atual</div>
          <span class="tag ${tagClass(proc.status)}" style="font-size:11.5px">${esc(proc.status)}</span>
        </div>
        <div class="protocolo-actions">
          <button class="btn btn-outline btn-xs" onclick="copiarLink()">${ico('copy')} Copiar link</button>
          <span style="font-size:10.5px;color:var(--text3)">Aberto em ${fmtData(proc.criado_em)}</span>
        </div>
      </div>

      <!-- Stepper -->
      <div class="stepper">
        ${ETAPAS.map((e,i) => `
          <div class="step ${i<idxAtual?'concluido':i===idxAtual?'atual':''}">
            <div class="step-dot">${i<idxAtual ? ico('check') : (i+1)}</div>
            <div class="step-label">${esc(e.status)}</div>
          </div>`).join('')}
      </div>

      <!-- Abas -->
      <div class="tabs">
        <button class="tab-btn ativa" onclick="trocarTab('dados')">${ico('user')} Meus Dados</button>
        <button class="tab-btn" onclick="trocarTab('documentos')">${ico('doc')} Documentos <span class="tab-count">${arquivos.length}</span></button>
        <button class="tab-btn" onclick="trocarTab('mensagens')">${ico('msg')} Mensagens <span class="tab-count">${mensagens.length}</span></button>
        <button class="tab-btn" onclick="trocarTab('historico')">${ico('clock')} Histórico <span class="tab-count">${historico.length}</span></button>
      </div>

      <!-- DADOS -->
      <div class="painel ativo" id="painel-dados">
        <div class="card">
          <div class="card-head"><div class="card-title">Dados cadastrais</div></div>
          <div class="card-body">
            <div class="grid-2">
              <div class="campo"><label>Nome completo <span class="req">*</span></label>
                <input type="text" id="edit-nome" value="${esc(proc.nome)}"></div>
              <div class="campo"><label>CPF</label>
                <input type="text" value="${fmtCPF(proc.cpf)}" disabled title="CPF não pode ser alterado"></div>
              <div class="campo"><label>Grupo <span class="req">*</span></label>
                <input type="text" id="edit-grupo" value="${esc(proc.grupo||'')}"></div>
              <div class="campo"><label>Cota <span class="req">*</span></label>
                <input type="text" id="edit-cota" value="${esc(proc.cota||'')}"></div>
              <div class="campo"><label>E-mail</label>
                <input type="email" id="edit-email" value="${esc(proc.email||'')}"></div>
              <div class="campo"><label>WhatsApp</label>
                <input type="text" id="edit-telefone" value="${esc(proc.telefone||'')}" oninput="mascaraTel(this)"></div>
              <div class="campo"><label>Corretor (opcional)</label>
                <input type="text" id="edit-corretor" value="${esc(proc.corretor||'')}"></div>
            </div>
            <div class="campo"><label>Observações</label>
              <textarea id="edit-desc">${esc(proc.descricao||'')}</textarea></div>
            <button class="btn btn-primary" id="btn-salvar-dados" onclick="salvarDados()">
              ${ico('save')} Salvar alterações
            </button>
          </div>
        </div>
      </div>

      <!-- DOCUMENTOS -->
      <div class="painel" id="painel-documentos">
        <div class="card">
          <div class="card-head"><div class="card-title">Documentos enviados</div></div>
          <div class="card-body">
            <div id="lista-arquivos">${renderListaArquivos(arquivos)}</div>
            <div style="margin-top:24px;padding-top:18px;border-top:1px solid var(--border)">
              <p style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">
                Adicionar mais documentos
              </p>
              <div class="doc-slot" id="upload-extra" style="cursor:pointer" onclick="document.getElementById('input-extra').click()">
                <input type="file" id="input-extra" accept=".pdf,.jpg,.jpeg,.png" multiple
                  onchange="uploadMaisArquivos(this)" style="display:none">
                <div class="doc-slot-head" style="margin-bottom:0;justify-content:center">
                  <div class="doc-slot-icon">${ico('upload','ico ico-lg')}</div>
                  <div>
                    <div style="font-size:13px;font-weight:600">Clique ou arraste arquivos aqui</div>
                    <div style="font-size:11px;color:var(--text3);margin-top:2px">PDF, JPG ou PNG — até 16MB cada</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- MENSAGENS -->
      <div class="painel" id="painel-mensagens">
        <div class="card">
          <div class="card-head"><div class="card-title">Comunicação com a equipe</div></div>
          <div class="card-body">
            <div class="timeline" id="timeline-msgs">${renderListaMensagens(mensagens)}</div>
            <div class="msg-input-wrap">
              <textarea id="campo-msg" placeholder="Digite sua mensagem para a equipe..."></textarea>
              <button class="btn btn-primary" onclick="enviarMensagem()">${ico('send')}</button>
            </div>
          </div>
        </div>
      </div>

      <!-- HISTORICO -->
      <div class="painel" id="painel-historico">
        <div class="card">
          <div class="card-head"><div class="card-title">Histórico do processo</div></div>
          <div class="card-body">${renderListaHistorico(historico)}</div>
        </div>
      </div>
    </div>`;

  setTimeout(() => {
    const tl = document.getElementById('timeline-msgs');
    if (tl) tl.scrollTop = tl.scrollHeight;
  }, 100);

  configDropExtra();
}

function configDropExtra(){
  const el = document.getElementById('upload-extra');
  if (!el) return;
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dragover'); });
  el.addEventListener('dragleave', () => el.classList.remove('dragover'));
  el.addEventListener('drop', e => {
    e.preventDefault(); el.classList.remove('dragover');
    const inp = document.getElementById('input-extra');
    inp.files = e.dataTransfer.files;
    uploadMaisArquivos(inp);
  });
}

function renderListaArquivos(arquivos){
  if (!arquivos.length) return `
    <div class="empty">
      <div class="empty-icon">${ico('doc','ico ico-lg')}</div>
      <div class="empty-msg">Nenhum documento enviado ainda.</div>
    </div>`;
  // Agrupar por categoria
  const cats = {};
  arquivos.forEach(a => { const k = a.categoria || 'outros'; (cats[k] = cats[k] || []).push(a); });
  const ordem = ['documento_foto','comp_residencia','outros'];
  const todasKeys = ordem.concat(Object.keys(cats).filter(k => !ordem.includes(k)));
  return todasKeys.filter(k => cats[k]).map(k => {
    const cat = CATEGORIAS_ANEXO.find(c => c.key === k);
    const titulo = cat ? cat.label : 'Outros documentos';
    return `
      <div style="margin-bottom:18px">
        <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">
          ${esc(titulo)}
        </div>
        ${cats[k].map(a => `
          <div class="arquivo-item">
            <div class="file-ico">${ico(iconeKey(a.nome_original))}</div>
            <div class="file-info">
              <div class="file-name">${esc(a.nome_original)}</div>
              <div class="file-meta">${fmtData(a.criado_em)}</div>
            </div>
            <a href="${sb.storage.from('arquivos').getPublicUrl(a.storage_path).data.publicUrl}"
              target="_blank" class="btn btn-outline btn-xs">${ico('open')} Abrir</a>
          </div>`).join('')}
      </div>`;
  }).join('');
}

function renderListaMensagens(mensagens){
  if (!mensagens.length) return `
    <div class="empty">
      <div class="empty-icon">${ico('msg','ico ico-lg')}</div>
      <div class="empty-msg">Nenhuma mensagem ainda.<br>Use o campo abaixo para falar com a equipe.</div>
    </div>`;
  return mensagens.map(m => `
    <div class="msg-item ${m.autor==='admin'?'admin':'cliente'}">
      <div class="msg-avatar">${m.autor==='admin' ? 'M' : 'V'}</div>
      <div>
        <div class="msg-balao">${esc(m.texto)}</div>
        <div class="msg-hora" style="${m.autor==='admin'?'':'text-align:right'}">
          ${m.autor==='admin' ? 'Equipe Master Prime' : 'Você'} · ${fmtDataHora(m.criado_em)}
        </div>
      </div>
    </div>`).join('');
}

function renderListaHistorico(historico){
  if (!historico.length) return `<div class="empty"><div class="empty-msg">Nenhum registro ainda.</div></div>`;
  return historico.map(h => `
    <div class="hist-item">
      <div class="hist-dot">${ico('clock')}</div>
      <div class="hist-content">
        <div class="hist-status"><span class="tag ${tagClass(h.status_novo)}">${esc(h.status_novo||'-')}</span></div>
        ${h.observacao ? `<div class="hist-obs">${esc(h.observacao)}</div>` : ''}
        <div class="hist-hora">${fmtDataHora(h.criado_em)}</div>
      </div>
    </div>`).join('');
}

function atualizarCabecalho(proc){
  const el = document.querySelector('.protocolo-bar');
  if (!el) return;
  el.innerHTML = `
    <div>
      <div class="protocolo-label">Protocolo</div>
      ${proc.protocolo
        ? `<div class="protocolo-num">${esc(proc.protocolo)}</div>`
        : `<div class="protocolo-pendente">${ico('clock')} Aguardando atribuição da equipe</div>`}
    </div>
    <div>
      <div class="protocolo-label">Status atual</div>
      <span class="tag ${tagClass(proc.status)}" style="font-size:11.5px">${esc(proc.status)}</span>
    </div>
    <div class="protocolo-actions">
      <button class="btn btn-outline btn-xs" onclick="copiarLink()">${ico('copy')} Copiar link</button>
      <span style="font-size:10.5px;color:var(--text3)">Aberto em ${fmtData(proc.criado_em)}</span>
    </div>`;
}
function atualizarStepper(proc){
  const stepper = document.querySelector('.stepper');
  if (!stepper) return;
  const idxAtual = ETAPAS.findIndex(e => e.status === proc.status);
  stepper.innerHTML = ETAPAS.map((e,i) => `
    <div class="step ${i<idxAtual?'concluido':i===idxAtual?'atual':''}">
      <div class="step-dot">${i<idxAtual ? ico('check') : (i+1)}</div>
      <div class="step-label">${esc(e.status)}</div>
    </div>`).join('');
}
function atualizarContadoresAbas(arq, msg, hist){
  const tabs = document.querySelectorAll('.tab-btn .tab-count');
  if (tabs[0]) tabs[0].textContent = arq.length;
  if (tabs[1]) tabs[1].textContent = msg.length;
  if (tabs[2]) tabs[2].textContent = hist.length;
}
function atualizarPainelDocumentos(arq){
  const lista = document.getElementById('lista-arquivos');
  if (lista) lista.innerHTML = renderListaArquivos(arq);
}
function atualizarPainelMensagens(msg){
  const tl = document.getElementById('timeline-msgs');
  if (!tl) return;
  const noFim = tl.scrollTop + tl.clientHeight >= tl.scrollHeight - 10;
  tl.innerHTML = renderListaMensagens(msg);
  if (noFim) tl.scrollTop = tl.scrollHeight;
}
function atualizarPainelHistorico(hist){
  const cb = document.querySelector('#painel-historico .card-body');
  if (cb) cb.innerHTML = renderListaHistorico(hist);
}

// ─── Salvar dados ───
async function salvarDados(){
  const nome  = v('edit-nome')?.trim();
  const grupo = v('edit-grupo')?.trim();
  const cota  = v('edit-cota')?.trim();
  if (!nome)  return alerta('alerta-portal','Nome é obrigatório.','erro');
  if (!grupo) return alerta('alerta-portal','Grupo é obrigatório.','erro');
  if (!cota)  return alerta('alerta-portal','Cota é obrigatória.','erro');

  const btn = document.getElementById('btn-salvar-dados');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Salvando...';

  const { error } = await sb.rpc('cliente_atualizar_processo', {
    p_token: TOKEN,
    p_nome:nome, p_email:v('edit-email')||null, p_telefone:v('edit-telefone')||null,
    p_grupo:grupo, p_cota:cota, p_corretor:v('edit-corretor')||null, p_descricao:v('edit-desc')||null
  });
  btn.disabled=false; btn.innerHTML=ico('save')+' Salvar alterações';
  if (error) alerta('alerta-portal','Erro ao salvar: '+error.message,'erro');
  else { alerta('alerta-portal','Dados salvos com sucesso!','sucesso'); processoAtual.nome=nome; }
}

// ─── Upload extras ───
async function uploadMaisArquivos(input){
  const files = Array.from(input.files||[]);
  if (!files.length) return;
  for (const f of files){
    if (f.size > 16*1024*1024){ alerta('alerta-portal',`"${f.name}" passa de 16MB.`,'aviso'); continue; }
    const path = `${TOKEN}/extra_${Date.now()}_${f.name}`;
    const { error: errUp } = await sb.storage.from('arquivos').upload(path, f);
    if (errUp){ alerta('alerta-portal','Erro no upload: '+errUp.message,'erro'); continue; }
    await sb.rpc('cliente_registrar_arquivo', {
      p_token:TOKEN, p_nome_original:f.name, p_storage_path:path, p_categoria:'outros'
    });
  }
  input.value='';
  alerta('alerta-portal','Arquivos enviados!','sucesso');
  await carregarProcesso(TOKEN);
  trocarTab('documentos');
}

// ─── Mensagem ───
async function enviarMensagem(){
  const c = document.getElementById('campo-msg');
  const t = (c?.value||'').trim();
  if (!t) return;
  const { error } = await sb.rpc('cliente_enviar_mensagem', { p_token:TOKEN, p_texto:t });
  if (error){ alerta('alerta-portal','Erro ao enviar mensagem.','erro'); return; }
  c.value='';
  await carregarProcesso(TOKEN);
  trocarTab('mensagens');
}

function copiarLink(){
  navigator.clipboard.writeText(window.location.href)
    .then(() => alerta('alerta-portal','Link copiado! Guarde para consultar.','sucesso'));
}

// ════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════
function trocarTab(tab){
  const nomes = ['dados','documentos','mensagens','historico'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('ativa', nomes[i]===tab));
  document.querySelectorAll('.painel').forEach(p => p.classList.remove('ativo'));
  document.getElementById(`painel-${tab}`)?.classList.add('ativo');
}

function v(id){ return document.getElementById(id)?.value; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtCPF(c){ return String(c||'').replace(/\D/g,'').replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4'); }
function fmtData(d){ return d ? new Date(d).toLocaleDateString('pt-BR') : '-'; }
function fmtDataHora(d){ return d ? new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '-'; }

function mascaraCPF(i){
  let v = i.value.replace(/\D/g,'').slice(0,11);
  v = v.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1-$2');
  i.value = v;
}
function mascaraTel(i){
  let v = i.value.replace(/\D/g,'').slice(0,11);
  v = v.replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{4,5})(\d{4})$/,'$1-$2');
  i.value = v;
}

function tagClass(s){
  return ({
    'Recebido':'tag-blue',
    'Em análise':'tag-amber',
    'Enviado para administradora':'tag-purple',
    'Em retorno da administradora':'tag-teal',
    'Finalizado':'tag-green',
    'Cancelado':'tag-red',
  })[s] || 'tag-gray';
}

function iconeKey(nome){
  const ext = String(nome||'').split('.').pop().toLowerCase();
  if (ext==='pdf') return 'doc';
  if (['jpg','jpeg','png'].includes(ext)) return 'doc';
  return 'doc';
}

function alerta(id, msg, tipo){
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `${ico(tipo==='erro'?'alert':tipo==='sucesso'?'check':'alert')} <span>${esc(msg)}</span>`;
  el.className = `alerta alerta-${tipo} visivel`;
  setTimeout(() => el.classList.remove('visivel'), 6000);
}

function mostrarNotif(texto){
  document.getElementById('notif-atualizacao')?.remove();
  const n = document.createElement('div');
  n.id='notif-atualizacao'; n.className='notif';
  n.innerHTML = ico('refresh') + ' ' + esc(texto);
  document.body.appendChild(n);
  setTimeout(() => n?.remove(), 4000);
}

document.addEventListener('keydown', e => {
  const c = document.getElementById('campo-msg');
  if (e.key==='Enter' && !e.shiftKey && document.activeElement===c){
    e.preventDefault(); enviarMensagem();
  }
});
</script>
</body>
</html>
